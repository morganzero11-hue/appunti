<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagina non trovata - 404</title>
    <link rel="stylesheet" href="/shared.css">
    <link rel="stylesheet" href="/style.css">
    <style>
        /* Un po' di stile specifico per centrare il contenuto */
        .error-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
        }
        .error-code {
            font-size: 6rem;
            font-weight: bold;
            color: #ff4757; /* Un rosso acceso, cambialo con i colori del tuo brand */
            margin: 0;
        }
        .error-message {
            font-size: 1.5rem;
            margin-bottom: 20px;
        }
        .btn-home {
            padding: 10px 20px;
            background-color: #007bff; /* Colore del tuo tema */
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: background 0.3s;
        }
        .btn-home:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="error-container">
        <h1 class="error-code">404</h1>
        <p class="error-message">Ops! Sembra che tu abbia perso gli appunti...</p>
        <p>La pagina o il file che stai cercando non esiste, è stato rimosso o ha cambiato indirizzo.</p>
        <br>
        <a href="/esplora.html" class="btn-home">Torna alla Home</a>
    </div>

</body>
</html>

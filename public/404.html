<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>404 — Appunti</title>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,700;0,900;1,700;1,900&family=Cabinet+Grotesk:wght@400;500;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:       #0a0a0f;
            --surface:  #111118;
            --surface2: #1a1a24;
            --surface3: #22222e;
            --text:     #f0ede8;
            --muted:    rgba(240,237,232,0.42);
            --accent:   #c8f060;
            --accent2:  #ff4d6d;
            --accent3:  #60b4f0;
            --nav-h:    64px;
            --radius:   16px;
            --border:   rgba(255,255,255,0.05);
            --border2:  rgba(255,255,255,0.11);
            --shadow-color: rgba(200,240,96,0.18);
        }

        body.light-theme {
            --bg: #f8f9fa;
            --surface: #ffffff;
            --surface2: #f1f3f5;
            --surface3: #e9ecef;
            --text: #1a1a1a;
            --muted: rgba(0,0,0,0.55);
            --accent: #a3cc2b;
            --accent2: #e63950;
            --accent3: #4a9bd6;
            --border: rgba(0,0,0,0.08);
            --border2: rgba(0,0,0,0.15);
            --shadow-color: rgba(163,204,43,0.3);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Cabinet Grotesk', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow: hidden;
            transition: background-color 0.3s, color 0.3s;
            display: flex;
            flex-direction: column;
        }

        /* ── TOPNAV ── */
        .topnav {
            position: fixed; top: 0; left: 0; right: 0;
            height: var(--nav-h);
            background: rgba(10,10,15,0.9);
            backdrop-filter: blur(20px) saturate(180%);
            display: flex; align-items: center; padding: 0 36px;
            z-index: 1000; border-bottom: 1px solid var(--border);
            transition: background-color 0.3s;
        }
        body.light-theme .topnav { background: rgba(248,249,250,0.9); }

        .topnav__brand {
            display: flex; align-items: center; gap: 10px;
            font-family: 'Fraunces', serif; font-size: 1.4rem; font-weight: 900;
            color: var(--accent); text-decoration: none;
            letter-spacing: -0.4px;
        }

        /* ── ANIMATED BACKGROUND ── */
        .bg-canvas {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            overflow: hidden;
        }
        .bg-canvas::before {
            content: '';
            position: absolute; inset: 0;
            background:
                radial-gradient(ellipse 700px 500px at 10% 50%, rgba(200,240,96,0.07) 0%, transparent 60%),
                radial-gradient(ellipse 600px 500px at 90% 20%, rgba(96,180,240,0.05) 0%, transparent 60%),
                radial-gradient(ellipse 500px 400px at 50% 100%, rgba(255,77,109,0.05) 0%, transparent 60%);
        }
        .bg-canvas::after {
            content: '';
            position: absolute; inset: 0;
            background-image: radial-gradient(rgba(255,255,255,0.025) 1px, transparent 1px);
            background-size: 28px 28px;
        }
        body.light-theme .bg-canvas::after {
            background-image: radial-gradient(rgba(0,0,0,0.04) 1px, transparent 1px);
        }

        /* Floating particles */
        .particle {
            position: absolute;
            border-radius: 50%;
            animation: float linear infinite;
            opacity: 0;
        }
        @keyframes float {
            0%   { transform: translateY(110vh) translateX(0) rotate(0deg); opacity: 0; }
            5%   { opacity: 1; }
            95%  { opacity: 0.6; }
            100% { transform: translateY(-10vh) translateX(60px) rotate(720deg); opacity: 0; }
        }

        /* ── MAIN CONTENT ── */
        .page {
            position: relative; z-index: 1;
            flex: 1;
            display: flex; align-items: center; justify-content: center;
            padding: calc(var(--nav-h) + 32px) 24px 40px;
            min-height: 100vh;
        }

        .container {
            text-align: center;
            max-width: 600px;
            width: 100%;
            animation: appear 0.8s cubic-bezier(0.16,1,0.3,1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }
        @keyframes appear {
            to { opacity: 1; transform: translateY(0); }
        }

        /* ── 404 BIG NUMBER ── */
        .code-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 8px;
        }

        .code-404 {
            font-family: 'Fraunces', serif;
            font-style: italic;
            font-size: clamp(7rem, 22vw, 13rem);
            font-weight: 900;
            line-height: 0.9;
            letter-spacing: -8px;
            background: linear-gradient(135deg, var(--accent) 0%, rgba(200,240,96,0.6) 50%, var(--accent3) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            position: relative;
            z-index: 1;
            animation: shimmer 4s ease infinite;
            background-size: 200% 200%;
        }
        @keyframes shimmer {
            0%, 100% { background-position: 0% 50%; }
            50%       { background-position: 100% 50%; }
        }

        /* Glow blob sotto il numero */
        .code-glow {
            position: absolute;
            width: 120%; height: 60%;
            left: -10%; bottom: -20%;
            background: radial-gradient(ellipse, rgba(200,240,96,0.18) 0%, transparent 70%);
            filter: blur(30px);
            z-index: 0;
            pointer-events: none;
            animation: pulse 3s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.8; transform: scale(1); }
            50%       { opacity: 1; transform: scale(1.1); }
        }

        /* ── CARD ── */
        .error-card {
            background: var(--surface);
            border: 1px solid var(--border2);
            border-radius: 24px;
            padding: 40px 40px 36px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 30px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
            animation: appear 0.9s 0.1s cubic-bezier(0.16,1,0.3,1) both;
        }
        body.light-theme .error-card {
            box-shadow: 0 30px 80px rgba(0,0,0,0.1), inset 0 1px 0 rgba(255,255,255,0.8);
        }

        /* Decorative accent line on top */
        .error-card::before {
            content: '';
            position: absolute;
            top: 0; left: 10%; right: 10%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            border-radius: 0 0 4px 4px;
        }

        /* Subtle inner glow */
        .error-card::after {
            content: '';
            position: absolute;
            inset: 0; border-radius: 24px;
            background: radial-gradient(ellipse 80% 50% at 50% 0%, rgba(200,240,96,0.04) 0%, transparent 60%);
            pointer-events: none;
        }
        body.light-theme .error-card::after {
            background: radial-gradient(ellipse 80% 50% at 50% 0%, rgba(163,204,43,0.06) 0%, transparent 60%);
        }

        /* ── BADGE ── */
        .badge-lost {
            display: inline-flex; align-items: center; gap: 7px;
            background: rgba(255,77,109,0.1); border: 1px solid rgba(255,77,109,0.2);
            color: var(--accent2); border-radius: 30px;
            padding: 5px 14px; font-size: 0.75rem; font-weight: 800;
            text-transform: uppercase; letter-spacing: 1px;
            margin-bottom: 20px;
        }
        .badge-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--accent2);
            animation: blink 1.2s ease-in-out infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.2; }
        }

        .error-title {
            font-family: 'Fraunces', serif;
            font-size: clamp(1.5rem, 4vw, 2rem);
            font-weight: 900;
            letter-spacing: -0.5px;
            line-height: 1.2;
            margin-bottom: 12px;
        }
        .error-desc {
            color: var(--muted);
            font-size: 0.92rem;
            font-weight: 500;
            line-height: 1.65;
            margin-bottom: 32px;
        }

        /* ── ACTIONS ── */
        .actions {
            display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
        }

        .btn-primary {
            background: var(--accent);
            color: #0a0a0f;
            padding: 13px 28px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 800;
            font-size: 0.92rem;
            letter-spacing: -0.2px;
            border: none; cursor: pointer;
            font-family: 'Cabinet Grotesk', sans-serif;
            transition: all 0.25s;
            display: inline-flex; align-items: center; gap: 8px;
        }
        body.light-theme .btn-primary { color: #fff; }
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 32px var(--shadow-color);
        }

        .btn-secondary {
            background: var(--surface2);
            color: var(--text);
            padding: 13px 28px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 800;
            font-size: 0.92rem;
            letter-spacing: -0.2px;
            border: 1px solid var(--border2); cursor: pointer;
            font-family: 'Cabinet Grotesk', sans-serif;
            transition: all 0.25s;
            display: inline-flex; align-items: center; gap: 8px;
        }
        .btn-secondary:hover {
            background: var(--surface3);
            transform: translateY(-2px);
        }

        /* ── QUICK LINKS ── */
        .quick-links {
            display: flex; justify-content: center; gap: 8px; flex-wrap: wrap;
            margin-top: 28px; padding-top: 24px;
            border-top: 1px solid var(--border);
        }
        .quick-link {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 7px 14px; border-radius: 30px;
            background: var(--surface2); border: 1px solid var(--border2);
            color: var(--muted); font-size: 0.78rem; font-weight: 700;
            text-decoration: none; transition: all 0.2s;
            letter-spacing: -0.1px;
        }
        .quick-link:hover {
            color: var(--accent);
            border-color: rgba(200,240,96,0.25);
            background: rgba(200,240,96,0.06);
        }
        body.light-theme .quick-link:hover {
            border-color: rgba(163,204,43,0.3);
            background: rgba(163,204,43,0.08);
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 600px) {
            .topnav { padding: 12px 16px; }
            .error-card { padding: 28px 20px 24px; border-radius: 20px; }
            .actions { flex-direction: column; }
            .btn-primary, .btn-secondary { justify-content: center; }
            .code-404 { letter-spacing: -4px; }
        }
    </style>
    <script>
        if (localStorage.getItem('appuntiTheme') === 'light') {
            document.documentElement.classList.add('light-theme');
        }
    </script>
</head>
<body>

<nav class="topnav">
    <a href="index.html" class="topnav__brand">📚 Appunti</a>
</nav>

<!-- Background -->
<div class="bg-canvas" id="bgCanvas"></div>

<!-- Main -->
<main class="page">
    <div class="container">

        <!-- Numero 404 -->
        <div class="code-wrapper">
            <div class="code-404">404</div>
            <div class="code-glow"></div>
        </div>

        <!-- Card -->
        <div class="error-card">
            <div class="badge-lost">
                <span class="badge-dot"></span>
                Pagina non trovata
            </div>

            <h1 class="error-title">Ops! Hai perso i tuoi appunti… 📄</h1>
            <p class="error-desc">
                La pagina che stai cercando non esiste, è stata rimossa<br>
                o ha cambiato indirizzo. Nessun problema — torna indietro!
            </p>

            <div class="actions">
                <a href="/esplora.html" class="btn-primary">
                    🏠 Vai alla Home
                </a>
                <button class="btn-secondary" onclick="history.back()">
                    ← Torna indietro
                </button>
            </div>

            <div class="quick-links">
                <a href="/esplora.html" class="quick-link">🧭 Esplora</a>
                <a href="/profilo.html" class="quick-link">👤 Profilo</a>
                <a href="/podcast.html" class="quick-link">🎙️ Podcast</a>
                <a href="/utenti.html" class="quick-link">👥 Utenti</a>
            </div>
        </div>

    </div>
</main>

<script>
    // Applica tema
    document.addEventListener('DOMContentLoaded', () => {
        if (localStorage.getItem('appuntiTheme') === 'light') {
            document.body.classList.add('light-theme');
        }
        spawnParticles();
    });

    // Floating particles
    function spawnParticles() {
        const canvas = document.getElementById('bgCanvas');
        const colors = ['#c8f060', '#60b4f0', '#ff4d6d'];
        const count = 18;

        for (let i = 0; i < count; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const size = Math.random() * 5 + 2;
            const color = colors[Math.floor(Math.random() * colors.length)];
            const left = Math.random() * 100;
            const duration = Math.random() * 18 + 10;
            const delay = Math.random() * 15;

            p.style.cssText = `
                width: ${size}px;
                height: ${size}px;
                background: ${color};
                left: ${left}%;
                bottom: -10px;
                animation-duration: ${duration}s;
                animation-delay: -${delay}s;
                opacity: 0;
                box-shadow: 0 0 ${size * 3}px ${color};
            `;
            canvas.appendChild(p);
        }
    }
</script>

</body>
</html>

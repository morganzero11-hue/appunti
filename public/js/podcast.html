<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Podcast — Appunti</title>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,700;0,900;1,700&family=Cabinet+Grotesk:wght@400;500;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a; --surface: #111111; --surface2: #181818;
            --text: #f2f0ec; --muted: rgba(242,240,236,0.45);
            --accent: #c8f060; --accent2: #ff4d6d; --nav-h: 62px;
            --radius: 16px;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Cabinet Grotesk', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 40px; min-height: 100vh; }
        
        /* ─── NAVBAR ─── */
        .topnav { position: fixed; top: 0; left: 0; right: 0; height: var(--nav-h); background: rgba(10,10,10,0.95); backdrop-filter: blur(10px); display: flex; align-items: center; padding: 0 32px; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .topnav__brand { display: flex; align-items: center; gap: 12px; font-family: 'Fraunces', serif; font-size: 1.5rem; font-weight: 900; color: var(--accent); text-decoration: none; margin-right: 30px; }
        .topnav__links { list-style: none; display: flex; gap: 6px; flex: 1; margin: 0; padding: 0; }
        .topnav__links a { color: var(--muted); text-decoration: none; font-size: 0.95rem; font-weight: 700; padding: 8px 16px; border-radius: 8px; transition: all .2s; }
        .topnav__links a:hover { color: var(--text); background: rgba(255,255,255,0.05); }
        .topnav__links a.active { color: var(--accent); }
        .topnav__login { background: var(--accent); color: #0a0a0a; padding: 8px 24px; border-radius: 8px; text-decoration: none; font-weight: 800; font-size: 0.95rem; transition: transform .2s; margin-left: auto; }
        .topnav__login:hover { transform: scale(1.05); }
        @media (max-width: 768px) { .topnav__links { display: none; } }

        /* ─── MAIN CONTENT ─── */
        .main-content { padding: calc(var(--nav-h) + 40px) 20px 40px; max-width: 1200px; margin: 0 auto; }
        
        .header-pod { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; flex-wrap: wrap; gap: 20px;}
        .header-pod h1 { font-family: 'Fraunces', serif; font-size: 2.5rem; }
        .btn-upload { background: var(--accent); color: #000; padding: 12px 24px; border-radius: 12px; font-weight: 800; border: none; cursor: pointer; font-family: 'Cabinet Grotesk', sans-serif; font-size: 1rem; transition: transform 0.2s;}
        .btn-upload:hover { transform: translateY(-2px); }

        /* Griglia Podcast */
        .pod-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; }
        .pod-card { background: var(--surface); border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); transition: transform 0.2s, border-color 0.2s; display: flex; flex-direction: column; }
        .pod-card:hover { transform: translateY(-4px); border-color: rgba(255,255,255,0.2); }
        .pod-cover { height: 200px; background: var(--surface2); background-size: cover; background-position: center; position: relative; }
        .pod-info { padding: 24px; flex: 1; display: flex; flex-direction: column; }
        .pod-category { font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--accent); margin-bottom: 8px; }
        .pod-title { font-family: 'Fraunces', serif; font-size: 1.4rem; margin-bottom: 8px; line-height: 1.2; }
        .pod-author { font-size: 0.9rem; color: var(--muted); margin-bottom: 16px; font-weight: 600;}
        .pod-desc { font-size: 0.95rem; color: rgba(255,255,255,0.7); margin-bottom: 24px; line-height: 1.5; flex: 1;}
        .pod-audio { width: 100%; border-radius: 30px; }
        
        /* Modal Upload */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(8px); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .modal-overlay.open { display: flex; }
        .modal { background: var(--surface); border: 1px solid var(--border2); border-radius: 20px; padding: 32px; width: 520px; max-width: 95vw; }
        .modal__title { font-family: 'Fraunces', serif; font-size: 1.5rem; font-weight: 900; margin-bottom: 24px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: 800; margin-bottom: 8px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
        .form-group input[type="text"], .form-group textarea, .form-group select { width: 100%; padding: 14px 16px; border-radius: 12px; border: 2px solid var(--border2); background: var(--bg); color: var(--text); font-family: 'Cabinet Grotesk', sans-serif; font-size: 1rem; font-weight: 600; outline: none; }
        .form-group input:focus, .form-group textarea:focus { border-color: var(--accent); }
        .file-input-wrapper { background: var(--surface2); border: 2px dashed var(--border2); border-radius: 12px; padding: 20px; text-align: center; cursor: pointer; position: relative; }
        .file-input-wrapper input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
        .modal__actions { display: flex; gap: 10px; margin-top: 24px; }
        .modal__btn { flex: 1; padding: 14px; border-radius: 11px; font-family: 'Cabinet Grotesk', sans-serif; font-size: 1rem; font-weight: 800; cursor: pointer; border: none; }
        .modal__btn--accent { background: var(--accent); color: #0f0f0f; }
        .modal__btn--ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border2); }

        .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); grid-column: 1 / -1; }
    </style>
</head>
<body>

<nav class="topnav">
    <a href="index.html" class="topnav__brand">📚 Appunti</a>
    <ul class="topnav__links">
        <li><a href="index.html">Home</a></li>
        <li><a href="esplora.html">Esplora</a></li>
        <li><a href="podcast.html" class="active">Podcast</a></li>
        <li><a href="profilo.html">Profilo</a></li>
        <li><a href="utenti.html">Utenti</a></li>
    </ul>
    <a href="login.html" class="topnav__login" id="navLoginBtn">Accedi</a>
</nav>

<div class="main-content">
    <div class="header-pod">
        <h1>🎙️ Libreria Podcast</h1>
        <button class="btn-upload" onclick="document.getElementById('uploadModal').classList.add('open')">✦ Carica Episodio</button>
    </div>

    <div class="pod-grid" id="podcastFeed">
        <p style="color:var(--muted)">Caricamento podcast in corso...</p>
    </div>
</div>

<div class="modal-overlay" id="uploadModal">
    <div class="modal">
        <div class="modal__title">Carica un nuovo Podcast</div>
        
        <div class="form-group">
            <label>Titolo Episodio</label>
            <input type="text" id="podTitolo" placeholder="Es: La Rivoluzione Francese in 10 minuti">
        </div>

        <div class="form-group">
            <label>Categoria</label>
            <select id="podCategoria">
                <option>Storia</option>
                <option>Scienze</option>
                <option>Letteratura</option>
                <option>Filosofia</option>
                <option>Motivazionale</option>
                <option>Altro</option>
            </select>
        </div>

        <div class="form-group">
            <label>Descrizione Breve</label>
            <textarea id="podDesc" rows="3" placeholder="Di cosa parla questo episodio?"></textarea>
        </div>
        
        <div class="form-group">
            <label>File Audio (MP3, WAV)</label>
            <div class="file-input-wrapper">
                <span id="labelAudio">🎵 Clicca per selezionare l'audio</span>
                <input type="file" id="podAudio" accept="audio/*" onchange="aggiornaTestoFile('podAudio', 'labelAudio')">
            </div>
        </div>
        
        <div class="form-group">
            <label>Copertina (Opzionale)</label>
            <div class="file-input-wrapper">
                <span id="labelCover">📸 Clicca per selezionare l'immagine</span>
                <input type="file" id="podCover" accept="image/*" onchange="aggiornaTestoFile('podCover', 'labelCover')">
            </div>
        </div>

        <div class="modal__actions">
            <button class="modal__btn modal__btn--ghost" onclick="document.getElementById('uploadModal').classList.remove('open')">Annulla</button>
            <button class="modal__btn modal__btn--accent" id="btnSalvaPod" onclick="salvaPodcast()">🚀 Pubblica</button>
        </div>
    </div>
</div>

<script src="/js/podcast.js"></script>
</body>
</html>

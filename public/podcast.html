<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Podcast — Appunti</title>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,700;0,900;1,700&family=Cabinet+Grotesk:wght@400;500;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a; --surface: #111111; --surface2: #181818;
            --text: #f2f0ec; --muted: rgba(242,240,236,0.45);
            --accent: #c8f060; --accent2: #ff4d6d; --nav-h: 62px;
            --radius: 16px;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Cabinet Grotesk', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 40px; min-height: 100vh; }
        
        /* ─── NAVBAR ─── */
        .topnav { position: fixed; top: 0; left: 0; right: 0; height: var(--nav-h); background: rgba(10,10,10,0.95); backdrop-filter: blur(10px); display: flex; align-items: center; padding: 0 32px; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .topnav__brand { display: flex; align-items: center; gap: 12px; font-family: 'Fraunces', serif; font-size: 1.5rem; font-weight: 900; color: var(--accent); text-decoration: none; margin-right: 30px; }
        .topnav__links { list-style: none; display: flex; gap: 6px; flex: 1; margin: 0; padding: 0; }
        .topnav__links a { color: var(--muted); text-decoration: none; font-size: 0.95rem; font-weight: 700; padding: 8px 16px; border-radius: 8px; transition: all .2s; }
        .topnav__links a:hover { color: var(--text); background: rgba(255,255,255,0.05); }
        .topnav__links a.active { color: var(--accent); }
        .topnav__login { background: var(--accent); color: #0a0a0a; padding: 8px 24px; border-radius: 8px; text-decoration: none; font-weight: 800; font-size: 0.95rem; transition: transform .2s; margin-left: auto; }
        .topnav__login:hover { transform: scale(1.05); }
        @media (max-width: 768px) { .topnav__links { display: none; } }

        /* ─── MAIN CONTENT E HEADER ─── */
        .main-content { padding: calc(var(--nav-h) + 40px) 20px 40px; max-width: 1200px; margin: 0 auto; }
        .header-pod { margin-bottom: 30px; }
        .header-pod h1 { font-family: 'Fraunces', serif; font-size: 2.5rem; display: inline-block; }
        
        /* ─── SEZIONE IN EVIDENZA ─── */
        .featured-section { margin-bottom: 50px; padding: 30px; background: linear-gradient(135deg, rgba(200,240,96,0.05) 0%, rgba(200,240,96,0) 100%); border-radius: var(--radius); border: 1px solid rgba(200,240,96,0.1); }
        .section-title { font-family: 'Fraunces', serif; font-size: 1.5rem; font-weight: 900; margin-bottom: 20px; color: var(--accent); display: flex; align-items: center; gap: 10px; }
        .section-title span { font-size: 1.8rem; }
        
        .featured-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 24px; }

        /* ─── FILTRI ─── */
        .filters-container { display: flex; gap: 15px; margin-bottom: 40px; flex-wrap: wrap; background: var(--surface); padding: 20px; border-radius: var(--radius); border: 1px solid var(--surface2); }
        .filters-container input, .filters-container select { 
            padding: 12px 16px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); 
            background: var(--bg); color: var(--text); font-family: 'Cabinet Grotesk', sans-serif;
            flex: 1; min-width: 180px; outline: none; transition: border-color 0.2s, background 0.2s;
        }
        .filters-container input:focus, .filters-container select:focus { border-color: var(--accent); background: var(--surface2); }

        /* ─── GRIGLIA PODCAST ─── */
        .pod-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; }
        .pod-card { background: var(--surface); border-radius: var(--radius); overflow: hidden; border: 1px solid rgba(255,255,255,0.05); transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s; display: flex; flex-direction: column; }
        .pod-card:hover { transform: translateY(-4px); border-color: rgba(255,255,255,0.2); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        
        /* Stile Card Speciale per quelli in Evidenza */
        .featured-card { border-color: rgba(200,240,96,0.2); background: rgba(17,17,17,0.8); backdrop-filter: blur(10px); }
        .featured-card:hover { border-color: var(--accent); box-shadow: 0 10px 30px rgba(200,240,96,0.1); }
        .featured-badge { position: absolute; top: 15px; right: 15px; background: var(--accent); color: #000; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 800; font-family: 'Cabinet Grotesk', sans-serif; box-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 10; }

        .pod-cover { height: 200px; background: var(--surface2); background-size: cover; background-position: center; position: relative; }
        .pod-info { padding: 24px; flex: 1; display: flex; flex-direction: column; }
        .pod-category { font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--accent); margin-bottom: 8px; }
        .pod-title { font-family: 'Fraunces', serif; font-size: 1.4rem; margin-bottom: 8px; line-height: 1.2; }
        .pod-author { font-size: 0.9rem; color: var(--muted); margin-bottom: 16px; font-weight: 600;}
        .pod-desc { font-size: 0.95rem; color: rgba(255,255,255,0.7); margin-bottom: 16px; line-height: 1.5; flex: 1;}
        .pod-audio { width: 100%; border-radius: 30px; margin-top: 10px; }
        
        .btn-like { 
            margin-top: 15px; background: transparent; border: 1px solid rgba(255,77,109,0.3); 
            color: var(--accent2); padding: 8px 16px; border-radius: 8px; cursor: pointer; 
            font-weight: bold; font-family: 'Cabinet Grotesk', sans-serif; transition: all 0.2s; width: fit-content;
        }
        .btn-like:hover { background: rgba(255,77,109,0.1); transform: scale(1.05); }
        .like-count { font-size: 0.85rem; color: var(--muted); margin-left: 8px; font-weight: 600; }

        .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); grid-column: 1 / -1; }
    </style>
</head>
<body>

<nav class="topnav">
    <a href="index.html" class="topnav__brand">📚 Appunti</a>
    <ul class="topnav__links">
        <li><a href="index.html">Home</a></li>
        <li><a href="esplora.html">Esplora</a></li>
        <li><a href="profilo.html">Profilo</a></li>
        <li><a href="utenti.html">Utenti</a></li>
        <li><a href="podcast.html" class="active">Podcast</a></li>
        <li><a href="impostazioni.html">Impostazioni</a></li>
    </ul>
    <a href="login.html" class="topnav__login" id="navLoginBtn">Accedi</a>
</nav>

<div class="main-content">
    <div class="header-pod">
        <h1>🎙️ Libreria Podcast</h1>
    </div>

    <div class="featured-section" id="featuredSection" style="display: none;">
        <div class="section-title"><span>🔥</span> I Più Amati</div>
        <div class="featured-grid" id="featuredFeed">
            </div>
    </div>

    <div class="section-title"><span>🎧</span> Esplora Tutti</div>
    <div class="filters-container">
        <input type="text" id="searchTitolo" placeholder="🔍 Cerca titolo o descr..." oninput="applicaFiltri()">
        <select id="filterCategoria" onchange="applicaFiltri()">
            <option value="">Tutte le categorie</option>
            <option value="Storia">Storia</option>
            <option value="Scienze">Scienze</option>
            <option value="Letteratura">Letteratura</option>
            <option value="Filosofia">Filosofia</option>
            <option value="Motivazionale">Motivazionale</option>
            <option value="Altro">Altro</option>
        </select>
        <input type="text" id="filterScuola" placeholder="🏫 Cerca per scuola..." oninput="applicaFiltri()">
        <input type="text" id="filterFonti" placeholder="📚 Cerca fonte/libro..." oninput="applicaFiltri()">
    </div>

    <div class="pod-grid" id="podcastFeed">
        <p style="color:var(--muted)">Caricamento podcast in corso...</p>
    </div>
</div>

<script src="/js/podcast.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esplora — Appunti</title>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,700;0,900;1,700&family=Cabinet+Grotesk:wght@400;500;700;800&family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0f0f0f;
            --sidebar-w: 260px;
            --surface: #181818;
            --surface2: #222222;
            --border: rgba(255,255,255,0.07);
            --border2: rgba(255,255,255,0.14);
            --text: #f2f0ec;
            --muted: rgba(242,240,236,0.45);
            --accent: #c8f060;
        }

        html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Cabinet Grotesk', sans-serif; }

        /* ── SIDEBAR SINISTRA ── */
        .sidebar {
            position: fixed;
            top: 0; left: 0; bottom: 0;
            width: var(--sidebar-w);
            background: #111;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 24px;
            z-index: 1000;
        }

        .sidebar__brand {
            display: flex; align-items: center; gap: 12px;
            font-family: 'Fraunces', serif; font-size: 1.5rem; font-weight: 900;
            color: #fff; text-decoration: none; margin-bottom: 30px;
        }
        
        .logo-dot { width: 12px; height: 12px; border-radius: 3px; background: var(--accent); }

        /* Ricerca in Sidebar */
        .sidebar__search { margin-bottom: 24px; position: relative; }
        .sidebar__search input {
            width: 100%; background: var(--surface2); border: 1px solid var(--border);
            border-radius: 10px; padding: 10px 14px; color: #fff;
            font-family: inherit; font-size: 0.9rem; outline: none;
        }
        .sidebar__search input:focus { border-color: var(--accent); }

        .sidebar__links { list-style: none; display: flex; flex-direction: column; gap: 6px; flex: 1; }
        .sidebar__links a {
            color: rgba(255,255,255,0.6); text-decoration: none; font-size: 0.95rem;
            font-weight: 600; padding: 12px 16px; border-radius: 10px; transition: all .2s;
            display: flex; align-items: center; gap: 12px;
        }
        .sidebar__links a:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .sidebar__links a.active { background: var(--surface2); color: var(--accent); }

        .nav-login-btn { 
            background: #f43f5e; color: #fff; text-align: center; 
            padding: 10px; border-radius: 10px; text-decoration: none; font-weight: 700;
        }

        /* ── FEED (Tiktok Style Massimizzato) ── */
        .feed {
            margin-left: var(--sidebar-w);
            height: 100vh; overflow-y: scroll;
            scroll-snap-type: y mandatory;
        }
        .feed::-webkit-scrollbar { display: none; }

        .card {
            height: 100vh; scroll-snap-align: start;
            display: flex; justify-content: center; align-items: center;
            position: relative; overflow: hidden; background: #000;
        }

        /* Immagine al massimo */
        .card__media-container {
            position: relative; z-index: 1;
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
        }

        .card__media-img {
            width: 100%; height: 100%;
            object-fit: contain; /* Massima visibilità senza tagli */
            max-width: 1000px; /* Limite per non sgranare su schermi enormi */
        }

        .card__bg-blur {
            position: absolute; inset: 0; z-index: 0;
            filter: blur(40px) brightness(0.3); transform: scale(1.1);
        }

        /* Info sovrapposte in basso */
        .card__content {
            position: absolute; bottom: 0; left: 0; right: 0;
            padding: 80px 40px 40px;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%);
            z-index: 2; pointer-events: none;
        }

        .card__subject {
            display: inline-block; padding: 4px 12px; border-radius: 20px;
            font-size: 0.75rem; font-weight: 800; margin-bottom: 12px;
            border: 1px solid currentColor;
        }

        .card__title {
            font-family: 'Fraunces', serif; font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 900; line-height: 1.1; margin-bottom: 15px;
        }

        /* Sidebar icone a destra */
        .card__sidebar {
            position: absolute; right: 24px; bottom: 40px;
            display: flex; flex-direction: column; align-items: center; gap: 20px;
            z-index: 5;
        }

        .side-btn {
            background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            width: 52px; height: 52px; border-radius: 50%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; color: #fff; transition: transform 0.2s;
        }
        .side-btn:hover { transform: scale(1.1); background: rgba(255,255,255,0.2); }
        .side-btn span { font-size: 0.65rem; font-weight: 800; margin-top: 2px; }

        .sidebar-avatar {
            width: 52px; height: 52px; border-radius: 50%;
            border: 2px solid var(--accent); overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            background: var(--surface2); text-decoration: none;
        }

        /* Modal & Toast (Invariati) */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .modal-overlay.open { display: flex; }
        .modal { background: var(--surface); border-radius: 20px; padding: 32px; width: 500px; max-width: 90vw; }
        .modal__input, .modal__select { width: 100%; background: var(--surface2); border: 1px solid var(--border2); border-radius: 10px; color: #fff; padding: 12px; margin-top: 8px; margin-bottom: 16px; outline: none; }
        
        .toast { position: fixed; bottom: 24px; right: 24px; background: var(--accent); color: #000; padding: 12px 24px; border-radius: 12px; font-weight: 800; opacity: 0; transform: translateY(20px); transition: all 0.3s; z-index: 9999; }
        .toast.show { opacity: 1; transform: translateY(0); }

        @media (max-width: 850px) {
            :root { --sidebar-w: 70px; }
            .sidebar__brand span, .sidebar__links span, .sidebar__search, .btn-txt { display: none; }
            .sidebar { padding: 15px 10px; align-items: center; }
            .card__content { padding: 40px 20px; }
        }
    </style>
</head>
<body>

<aside class="sidebar">
    <a href="index.html" class="sidebar__brand">
        <div class="logo-dot"></div>
        <span>Appunti</span>
    </a>

    <div class="sidebar__search">
        <input type="text" id="searchInput" placeholder="Cerca argomento..." oninput="cercaAppunti()">
    </div>

    <nav class="sidebar__links">
        <a href="index.html">🏠 <span>Home</span></a>
        <a href="esplora.html" class="active">🧭 <span>Esplora</span></a>
        <a href="profilo.html">👤 <span>Profilo</span></a>
        <a href="utenti.html">👥 <span>Utenti</span></a>
        <a href="impostazioni.html">⚙️ <span>Impostazioni</span></a>
    </nav>

    <div style="margin-top: auto; display: flex; flex-direction: column; gap: 10px;">
        <a href="login.html" class="nav-login-btn" id="navLoginBtn">Accedi</a>
        <button class="side-btn" style="width: 100%; border-radius: 10px;" onclick="apriModal()">
            <span class="btn-txt">➕ Carica File</span>
        </button>
    </div>
</aside>

<div class="feed" id="feed"></div>

<div class="modal-overlay" id="modal">
    <div class="modal">
        <h2 style="font-family:'Fraunces'; margin-bottom: 20px;">✦ Pubblica Appunti</h2>
        <label style="font-size: 0.8rem; opacity: 0.6;">TITOLO</label>
        <input class="modal__input" id="mTitolo" type="text" placeholder="es. Rivoluzione Francese">
        
        <label style="font-size: 0.8rem; opacity: 0.6;">MATERIA</label>
        <select class="modal__select" id="mMateria">
            <option>Matematica</option><option>Fisica</option><option>Storia</option>
            <option>Scienze</option><option>Italiano</option><option>Altro</option>
        </select>

        <label style="font-size: 0.8rem; opacity: 0.6;">COPERTINA (IMG)</label>
        <input class="modal__input" id="mCover" type="file" accept="image/*">

        <label style="font-size: 0.8rem; opacity: 0.6;">DOCUMENTO (PDF/IMG)</label>
        <input class="modal__input" id="mFile" type="file">

        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <button class="side-btn" style="flex:1; border-radius:10px; background:var(--surface2)" onclick="chiudiModal()">Annulla</button>
            <button class="side-btn" style="flex:1; border-radius:10px; background:var(--accent); color:#000" onclick="pubblicaAppunto()">🚀 Pubblica</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    let tuttiAppunti = [];

    /* ── LOGICA SEARCH ── */
    function cercaAppunti() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const filtrati = tuttiAppunti.filter(a => 
            a.titolo.toLowerCase().includes(query) || 
            a.materia.toLowerCase().includes(query) ||
            (a.username && a.username.toLowerCase().includes(query))
        );
        renderFeed(filtrati);
    }

    /* ── RECUPERO DATI ── */
    async function initEsplora() {
        try {
            const res = await fetch('/api/appunti');
            if (!res.ok) throw new Error('Errore API');
            tuttiAppunti = await res.json();
            renderFeed(tuttiAppunti);
        } catch (err) {
            console.error(err);
            // Fallback per test locale se non sei sul server
            tuttiAppunti = []; 
            renderFeed([]);
        }
    }

    function renderFeed(lista) {
        const feed = document.getElementById('feed');
        feed.innerHTML = '';

        if (lista.length === 0) {
            feed.innerHTML = `<div style="height:100vh; display:flex; align-items:center; justify-content:center; opacity:0.5;">Nessun appunto trovato</div>`;
            return;
        }

        const COLORI = { 'Matematica':'#c8f060','Fisica':'#60b8f0','Storia':'#ff4d6d','Scienze':'#16a34a','Default':'#fff' };

        lista.forEach(a => {
            const col = COLORI[a.materia] || COLORI.Default;
            const card = document.createElement('div');
            card.className = 'card';
            
            card.innerHTML = `
                <div class="card__bg-blur" style="background: ${a.cover_url ? `url('${a.cover_url}') center/cover` : col};"></div>
                
                <div class="card__media-container">
                    ${a.cover_url ? `<img src="${a.cover_url}" class="card__media-img">` : `<div style="font-size:5rem">📄</div>`}
                </div>

                <div class="card__content">
                    <span class="card__subject" style="color:${col}">${a.materia}</span>
                    <h1 class="card__title">${a.titolo}</h1>
                    <p style="opacity:0.8; font-weight:600;">@${a.username || 'studente'}</p>
                </div>

                <div class="card__sidebar">
                    <a href="utenti.html?user=${a.username}" class="sidebar-avatar">
                        ${a.foto_profilo_url ? `<img src="${a.foto_profilo_url}" width="100%">` : (a.username ? a.username[0].toUpperCase() : 'U')}
                    </a>
                    <button class="side-btn" onclick="toast('❤️ Mi piace!')">🤍<span>Like</span></button>
                    ${a.file_url ? `<button class="side-btn" onclick="window.open('${a.file_url}')">📥<span>Apri</span></button>` : ''}
                    <button class="side-btn" onclick="navigator.clipboard.writeText(location.href); toast('🔗 Link copiato!')">🔗<span>Copy</span></button>
                </div>
            `;
            feed.appendChild(card);
        });
    }

    /* ── FUNZIONI MODALE E CARICAMENTO (Tutte le tue originali) ── */
    function apriModal() { document.getElementById('modal').classList.add('open'); }
    function chiudiModal() { document.getElementById('modal').classList.remove('open'); }
    
    function getCookieSafe(name) {
        let value = `; ${document.cookie}`;
        let parts = value.split(`; ${name}=`);
        if (parts.length === 2) return parts.pop().split(';').shift();
        return null;
    }

    async function pubblicaAppunto() {
        const titolo = document.getElementById('mTitolo').value;
        const materia = document.getElementById('mMateria').value;
        const file = document.getElementById('mFile').files[0];
        const cover = document.getElementById('mCover').files[0];
        const utenteId = getCookieSafe('utente_id');

        if (!titolo || !file) { toast('⚠️ Titolo e File obbligatori!'); return; }
        if (!utenteId) { toast('⚠️ Accedi prima!'); return; }

        toast('⏳ Caricamento...');
        try {
            let coverUrl = null;
            if (cover) {
                const resC = await fetch(`/api/upload?filename=c_${cover.name}`, { method:'POST', body:cover });
                const dataC = await resC.json();
                coverUrl = dataC.url;
            }

            const resF = await fetch(`/api/upload?filename=${file.name}`, { method:'POST', body:file });
            const dataF = await resF.json();

            await fetch('/api/appunti', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    utente_id: utenteId, titolo, materia,
                    file_url: dataF.url, cover_url: coverUrl
                })
            });

            toast('🚀 Pubblicato!');
            chiudiModal();
            initEsplora();
        } catch (e) { toast('❌ Errore caricamento'); }
    }

    function toast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg; t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    document.addEventListener("DOMContentLoaded", () => {
        if (getCookieSafe('username')) document.getElementById('navLoginBtn').style.display = 'none';
        initEsplora();
    });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esplora — Appunti</title>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,700;0,900;1,700&family=Cabinet+Grotesk:wght@400;500;700;800&family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:      #0f0f0f;
            --surface: #181818;
            --surface2:#222222;
            --border:  rgba(255,255,255,0.07);
            --border2: rgba(255,255,255,0.14);
            --text:    #f2f0ec;
            --muted:   rgba(242,240,236,0.45);
            --accent:  #c8f060;
            --nav-h:   62px;
        }

        html, body { height: 100%; overflow: hidden; background: var(--bg); }

        body {
            font-family: 'Cabinet Grotesk', sans-serif;
            color: var(--text);
        }

        /* ─── NAVBAR ─── */
        .topnav { position: fixed; top: 0; left: 0; right: 0; height: var(--nav-h); background: #1c1c24; display: flex; align-items: center; padding: 0 32px; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .topnav__brand { display: flex; align-items: center; gap: 12px; font-family: 'Fraunces', 'Playfair Display', serif; font-size: 1.5rem; font-weight: 900; color: #fff; text-decoration: none; margin-right: 30px; }
        .topnav__logo { position: relative; width: 26px; height: 26px; }
        .topnav__logo span { position: absolute; width: 14px; height: 14px; border-radius: 3px; }
        .topnav__logo span:nth-child(1) { background: #c8f060; top: 0; left: 0; z-index: 3; }
        .topnav__logo span:nth-child(2) { background: #ff4d6d; top: 6px; left: 6px; z-index: 2; }
        .topnav__logo span:nth-child(3) { background: #60b8f0; top: 12px; left: 12px; z-index: 1; }
        .topnav__links { list-style: none; display: flex; gap: 6px; flex: 1; margin: 0; padding: 0; }
        .topnav__links a { color: rgba(255,255,255,0.65); text-decoration: none; font-size: 0.95rem; font-weight: 600; padding: 8px 16px; border-radius: 8px; transition: all .2s; }
        .topnav__links a:hover { background: rgba(255,255,255,0.08); color: #fff; }
        .topnav__links a.active { background: #2c2c38; color: #fbbf24; }
        .topnav__login { background: #f43f5e; color: #fff; padding: 8px 24px; border-radius: 8px; text-decoration: none; font-weight: 700; font-size: 0.95rem; transition: opacity .2s; }
        .topnav__login:hover { opacity: 0.8; }
        @media (max-width: 768px) { .topnav__links { display: none; } }

        /* ── FEED CONTAINER ── */
        .feed {
            position: fixed;
            top: var(--nav-h); left: 0; right: 0;
            bottom: 0;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            -webkit-overflow-scrolling: touch;
        }
        .feed::-webkit-scrollbar { display: none; }

        /* ── CARD (Tiktok Style) ── */
        .card {
            height: calc(100vh - var(--nav-h));
            scroll-snap-align: start;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* Sfondo Sfumato (Dietro la copertina centrale) */
        .card__bg { 
            position: absolute; inset: 0; pointer-events: none; z-index: 0; 
            filter: blur(20px) brightness(0.4);
            transform: scale(1.1); /* Per coprire i bordi dopo il blur */
        }

        /* Contenitore Centrale (Verticale come il telefono) */
        .card__media-container {
            position: relative;
            z-index: 1;
            height: 90%;
            aspect-ratio: 9 / 16; /* Proporzioni telefono */
            max-height: 800px;
            background: var(--surface);
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* L'immagine di copertina vera e propria */
        .card__media-img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* o 'contain' se non vuoi tagliare i bordi */
        }

        /* Se non c'è copertina, mostra questo div centrato */
        .card__no-media {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            text-align: center;
            padding: 20px;
            width: 100%;
            height: 100%;
        }
        .card__no-media-icon { font-size: 4rem; margin-bottom: 10px; opacity: 0.5; }

        /* Info e Testi (Sopra l'immagine, in basso a sinistra) */
        .card__content {
            position: absolute;
            bottom: 0; left: 0; right: 80px; /* Lascia spazio alla sidebar */
            padding: 30px 20px;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%);
            z-index: 2;
            pointer-events: auto;
        }

        .card__meta { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .card__author { font-size: 0.95rem; font-weight: 800; color: #fff; }
        .card__school { font-size: 0.75rem; color: rgba(255,255,255,0.7); }

        .card__subject {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 4px 12px; border-radius: 20px;
            font-size: 0.72rem; font-weight: 800;
            margin-bottom: 10px;
            background: rgba(0,0,0,0.5); /* Backup scuro */
            border: 1px solid transparent;
        }

        .card__title {
            font-family: 'Fraunces', serif;
            font-size: clamp(1.2rem, 2.5vw, 1.8rem);
            font-weight: 900; line-height: 1.2;
            letter-spacing: -0.5px; margin-bottom: 14px;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        .card__btn {
            padding: 8px 18px; border-radius: 10px;
            font-family: 'Cabinet Grotesk', sans-serif;
            font-size: 0.84rem; font-weight: 800;
            cursor: pointer; border: none;
            display: inline-flex; align-items: center; gap: 7px;
            transition: transform .2s, box-shadow .2s;
            text-decoration: none;
            background: var(--accent); color: #0f0f0f;
        }
        .card__btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(200,240,96,0.28); }

        /* Right Sidebar (Bottoni) */
        .card__sidebar {
            position: absolute;
            right: 16px; bottom: 30px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: flex-end;
            gap: 24px;
            z-index: 2;
            pointer-events: auto;
        }
        
        .sidebar-avatar {
            width: 48px; height: 48px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem; font-weight: 800; flex-shrink: 0;
            overflow: hidden; text-decoration: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: transform 0.2s;
            border: 2px solid #fff;
        }
        .sidebar-avatar:hover { transform: scale(1.1); }

        .side-btn {
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            cursor: pointer; border: none; background: none;
            color: rgba(255,255,255,0.8); transition: color .2s, transform .2s;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
        }
        .side-btn:hover { color: #fff; transform: scale(1.08); }
        .side-btn__icon {
            width: 44px; height: 44px; border-radius: 50%; /* Tondi stile Tiktok */
            background: rgba(0,0,0,0.4); backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.2);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem; transition: background .2s, border-color .2s;
        }
        .side-btn:hover .side-btn__icon { background: rgba(0,0,0,0.6); }
        .side-btn__count { font-size: 0.72rem; font-weight: 800; }

        .card + .card { border-top: 1px solid var(--border); }

        /* scroll hint */
        .scroll-hint {
            position: fixed; bottom: 24px; left: 50%;
            transform: translateX(-50%);
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            color: var(--muted); font-size: 0.72rem; font-weight: 700;
            pointer-events: none; z-index: 50;
            animation: bounce 2s ease-in-out infinite;
            opacity: 1; transition: opacity .4s;
        }
        .scroll-hint.hidden { opacity: 0; }
        @keyframes bounce {
            0%,100% { transform: translateX(-50%) translateY(0); }
            50%      { transform: translateX(-50%) translateY(-6px); }
        }

        /* upload modal */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.75); backdrop-filter: blur(8px);
            z-index: 200; display: none;
            align-items: center; justify-content: center;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: var(--surface); border: 1px solid var(--border2);
            border-radius: 20px; padding: 32px;
            width: 520px; max-width: 95vw;
            animation: modalIn .3s ease;
        }
        @keyframes modalIn { from { opacity:0; transform: scale(.95) translateY(12px); } to { opacity:1; transform: none; } }
        .modal__title { font-family: 'Fraunces', serif; font-size: 1.5rem; font-weight: 900; margin-bottom: 6px; }
        .modal__sub { font-size: 0.84rem; color: var(--muted); margin-bottom: 24px; }
        .modal__field { margin-bottom: 16px; }
        .modal__label { font-size: 0.78rem; font-weight: 800; color: var(--muted); margin-bottom: 6px; display: block; text-transform: uppercase; letter-spacing: 1px; }
        .modal__input, .modal__select {
            width: 100%; background: var(--surface2); border: 1px solid var(--border2);
            border-radius: 10px; color: var(--text);
            font-family: 'Cabinet Grotesk', sans-serif;
            font-size: 0.88rem; font-weight: 600;
            padding: 10px 14px; outline: none; transition: border-color .2s;
        }
        .modal__input:focus, .modal__select:focus { border-color: var(--accent); }
        .modal__select option { background: #222; }
        .modal__actions { display: flex; gap: 10px; margin-top: 24px; }
        .modal__btn {
            flex: 1; padding: 11px; border-radius: 11px;
            font-family: 'Cabinet Grotesk', sans-serif;
            font-size: 0.88rem; font-weight: 800;
            cursor: pointer; border: none; transition: transform .2s, box-shadow .2s;
        }
        .modal__btn:hover { transform: translateY(-1px); }
        .modal__btn--accent { background: var(--accent); color: #0f0f0f; }
        .modal__btn--accent:hover { box-shadow: 0 6px 20px rgba(200,240,96,0.3); }
        .modal__btn--ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border2); }

        /* toast */
        .toast {
            position: fixed; bottom: 24px; right: 24px;
            background: var(--accent); color: #0f0f0f;
            padding: 10px 20px; border-radius: 12px;
            font-family: 'Fraunces', serif; font-weight: 700; font-size: 0.88rem;
            opacity: 0; transform: translateY(10px);
            transition: all .3s; pointer-events: none; z-index: 9999;
        }
        .toast.show { opacity: 1; transform: translateY(0); }

        @media (max-width: 768px) {
            .card__media-container { width: 100%; height: 100%; border-radius: 0; aspect-ratio: auto; }
            .topnav__links { display: none; }
        }
    </style>
</head>
<body>

<nav class="topnav">
    <a href="index.html" class="topnav__brand">
        <div class="topnav__logo"><span></span><span></span><span></span></div>
        Appunti
    </a>
    <ul class="topnav__links">
        <li><a href="index.html">Home</a></li>
        <li><a href="esplora.html" class="active">Esplora</a></li>
        <li><a href="profilo.html">Profilo</a></li>
        <li><a href="utenti.html">Utenti</a></li>
        <li><a href="impostazioni.html">Impostazioni</a></li>
    </ul>
    <a href="login.html" class="topnav__login" id="navLoginBtn">Accedi</a>
</nav>

<div class="feed" id="feed"></div>

<div class="scroll-hint" id="scrollHint">
    <span style="font-size:1.2rem">↓</span>
    Scorri per scoprire
</div>

<div class="modal-overlay" id="modal">
    <div class="modal">
        <div class="modal__title">✦ Carica un file</div>
        <div class="modal__sub">Condividi i tuoi appunti in PDF o Immagine</div>
        
        <div class="modal__field">
            <label class="modal__label">Titolo</label>
            <input class="modal__input" id="mTitolo" type="text" placeholder="es. Derivate — regole fondamentali">
        </div>
        
        <div class="modal__field">
            <label class="modal__label">Materia</label>
            <select class="modal__select" id="mMateria">
                <option>Matematica</option>
                <option>Fisica</option>
                <option>Scienze</option>
                <option>Storia</option>
                <option>Italiano</option>
                <option>Inglese</option>
                <option>Informatica</option>
                <option>Altro</option>
            </select>
        </div>
        
        <div class="modal__field">
            <label class="modal__label">Foto Preview (Opzionale)</label>
            <input class="modal__input" id="mCover" type="file" accept="image/*">
        </div>

        <div class="modal__field">
            <label class="modal__label">Seleziona Documento (PDF/IMG)</label>
            <input class="modal__input" id="mFile" type="file" accept=".pdf, image/*">
        </div>

        <div class="modal__actions">
            <button class="modal__btn modal__btn--ghost" onclick="chiudiModal()">Annulla</button>
            <button class="modal__btn modal__btn--accent" onclick="pubblicaAppunto()">🚀 Pubblica</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    /* ── HELPER COOKIE ── */
    function getCookieSafe(name) {
        let value = `; ${document.cookie}`;
        let parts = value.split(`; ${name}=`);
        if (parts.length === 2) return parts.pop().split(';').shift();
        return null;
    }

    let tuttiAppunti = [];

    /* ── INIT: Recupera dal server ── */
    async function initEsplora() {
        try {
            const res = await fetch('/api/appunti');
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            tuttiAppunti = await res.json();
            renderFeed(tuttiAppunti);
        } catch (err) {
            console.error('Errore recupero appunti:', err);
            mostraErrore();
        }
    }

    /* ── FORMATTA DATA ── */
    function formatData(dateStr) {
        if (!dateStr) return 'Recente';
        const d = new Date(dateStr);
        if (isNaN(d)) return 'Recente';
        const diff = Math.floor((new Date() - d) / 1000);
        if (diff < 60)     return 'adesso';
        if (diff < 3600)   return `${Math.floor(diff / 60)} min fa`;
        if (diff < 86400)  return `${Math.floor(diff / 3600)} ore fa`;
        if (diff < 604800) return `${Math.floor(diff / 86400)} giorni fa`;
        return d.toLocaleDateString('it-IT', { day: '2-digit', month: 'short' });
    }

    /* ── RENDER FEED (Stile Mobile/TikTok Centrale) ── */
    function renderFeed(lista) {
        const feed = document.getElementById('feed');
        feed.innerHTML = '';

        if (!lista || lista.length === 0) {
            feed.innerHTML = `
                <div style="height:calc(100vh - 62px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:var(--muted);text-align:center;padding:32px">
                    <div style="font-size:3rem">📭</div>
                    <div style="font-family:'Fraunces',serif;font-size:1.4rem;font-weight:900;color:var(--text)">Nessun appunto ancora</div>
                    <div style="font-size:0.88rem;max-width:280px;line-height:1.6">Sii il primo a condividere qualcosa con la community!</div>
                    <button onclick="apriModal()" style="margin-top:8px;background:var(--accent);color:#0f0f0f;border:none;border-radius:10px;padding:10px 24px;font-family:'Cabinet Grotesk',sans-serif;font-size:0.88rem;font-weight:800;cursor:pointer;">✦ Carica un file</button>
                </div>`;
            return;
        }

        const COLORI = {
            'Matematica':'#d97706','Fisica':'#2563eb','Scienze':'#16a34a',
            'Storia':'#be185d','Italiano':'#b45309','Inglese':'#4f46e5','Informatica':'#dc2626', 'Altro':'#888888'
        };
        const avatarColori = ['#7c3aed','#be185d','#2563eb','#16a34a','#d97706','#0891b2','#dc2626'];

        lista.forEach(a => {
            const mc = COLORI[a.materia] || '#888';
            
            const username = a.username || a.utente_id || 'Anonimo'; 
            const autore = String(a.nome ? `${a.nome} ${a.cognome || ''}` : username);
            const iniziale = autore[0].toUpperCase();
            const ac = avatarColori[autore.charCodeAt(0) % avatarColori.length];
            const data_str = formatData(a.data_caricamento);

            const fotoProfiloHTML = a.foto_profilo_url 
                ? `<img src="${a.foto_profilo_url}" alt="Foto" style="width: 100%; height: 100%; object-fit: cover;">`
                : `<span style="color:${ac}; font-family: 'Fraunces', serif;">${iniziale}</span>`;

            // Decidiamo cosa mostrare al centro: L'immagine caricata o un div segnaposto
            const copertinaHTML = a.cover_url
                ? `<img src="${a.cover_url}" class="card__media-img" alt="Anteprima">`
                : `<div class="card__no-media">
                     <div class="card__no-media-icon">📄</div>
                     <div>Nessuna anteprima disponibile</div>
                   </div>`;

            // Lo sfondo sfocato: usa l'immagine se c'è, altrimenti il gradiente colorato
            const bgSfumato = a.cover_url
                ? `background: url('${a.cover_url}') center/cover no-repeat;`
                : `background: radial-gradient(ellipse at center, ${mc}44 0%, transparent 70%);`;

            const card = document.createElement('div');
            card.className = 'card';
            
            card.innerHTML = `
                <div class="card__bg" style="${bgSfumato}"></div>
                
                <div class="card__media-container" style="border: 1px solid ${mc}44;">
                    ${copertinaHTML}
                    
                    <div class="card__content">
                        <div class="card__meta">
                            <div>
                                <div class="card__author">@${username}</div>
                                <div class="card__school">${data_str}</div>
                            </div>
                        </div>
                        <div class="card__subject" style="color:${mc}; border-color:${mc};">${a.materia || 'Generale'}</div>
                        <div class="card__title">${a.titolo || 'Senza titolo'}</div>
                        <div class="card__actions">
                            ${a.file_url ? `<a href="${a.file_url}" target="_blank" class="card__btn">📥 Apri PDF/Img</a>` : ''}
                        </div>
                    </div>
                    
                    <div class="card__sidebar">
                        <a href="utenti.html?user=${encodeURIComponent(username)}" class="sidebar-avatar" style="background:${ac}22;">
                            ${fotoProfiloHTML}
                        </a>

                        <button class="side-btn" onclick="toast('🤍 Mi piace aggiunto!')">
                            <div class="side-btn__icon">🤍</div>
                            <span class="side-btn__count">Like</span>
                        </button>
                        <button class="side-btn" onclick="navigator.clipboard.writeText('${a.file_url}'); toast('🔗 Link copiato!')">
                            <div class="side-btn__icon">🔗</div>
                            <span class="side-btn__count">Copia</span>
                        </button>
                    </div>
                </div>
            `;
            feed.appendChild(card);
        });
    }

    function mostraErrore() {
        const feed = document.getElementById('feed');
        if (!feed) return;
        feed.innerHTML = `
            <div style="height:calc(100vh - 62px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:var(--muted);text-align:center;padding:32px">
                <div style="font-size:3rem">⚠️</div>
                <div style="font-family:'Fraunces',serif;font-size:1.4rem;font-weight:900;color:var(--text)">Errore Server</div>
                <div style="font-size:0.88rem;max-width:280px;line-height:1.6">Impossibile caricare dal database.</div>
            </div>`;
    }

    /* ── SCROLL HINT ── */
    const feedEl = document.getElementById('feed');
    feedEl.addEventListener('scroll', () => {
        if (feedEl.scrollTop > 80) document.getElementById('scrollHint').classList.add('hidden');
        else document.getElementById('scrollHint').classList.remove('hidden');
    }, { passive: true });

    /* ── KEYBOARD SCROLL ── */
    document.addEventListener('keydown', e => {
        const h = window.innerHeight - 62;
        if (e.key === 'ArrowDown') feedEl.scrollBy({ top: h, behavior: 'smooth' });
        if (e.key === 'ArrowUp')   feedEl.scrollBy({ top: -h, behavior: 'smooth' });
    });

    /* ── MODAL ── */
    function apriModal()  { document.getElementById('modal').classList.add('open'); }
    function chiudiModal(){ document.getElementById('modal').classList.remove('open'); }
    document.getElementById('modal').addEventListener('click', e => {
        if (e.target === document.getElementById('modal')) chiudiModal();
    });

    /* ── VERO CARICAMENTO CON API ── */
    async function pubblicaAppunto() {
        const titolo = document.getElementById('mTitolo').value.trim();
        const materia = document.getElementById('mMateria').value;
        const fileInput = document.getElementById('mFile').files[0];
        const coverInput = document.getElementById('mCover').files[0];
        
        const utenteId = getCookieSafe('utente_id');

        if (!utenteId) {
            toast('⚠️ Devi effettuare il login per pubblicare!');
            return;
        }

        if (!titolo || !fileInput) { 
            toast('⚠️ Inserisci il titolo e seleziona un file!'); 
            return; 
        }

        toast('⏳ Caricamento in corso... attendi.');
        
        const btn = document.querySelector('.modal__btn--accent');
        btn.textContent = 'Caricamento...';
        btn.disabled = true;

        try {
            let coverUrl = null;

            if (coverInput) {
                const resCover = await fetch(`/api/upload?filename=cover_${encodeURIComponent(coverInput.name)}`, {
                    method: 'POST',
                    body: coverInput
                });
                if (resCover.ok) {
                    const coverBlob = await resCover.json();
                    coverUrl = coverBlob.url;
                }
            }

            const blobRes = await fetch(`/api/upload?filename=${encodeURIComponent(fileInput.name)}`, {
                method: 'POST',
                body: fileInput
            });
            if (!blobRes.ok) throw new Error('Errore durante il caricamento del file su Blob');
            const blobData = await blobRes.json();

            const dbRes = await fetch('/api/appunti', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    utente_id: utenteId, 
                    titolo: titolo,
                    materia: materia,
                    file_url: blobData.url,
                    cover_url: coverUrl
                })
            });
            if (!dbRes.ok) throw new Error('Errore salvataggio nel Database');

            toast('🚀 Appunto pubblicato con successo!');
            chiudiModal();
            
            document.getElementById('mTitolo').value = '';
            document.getElementById('mFile').value = '';
            document.getElementById('mCover').value = '';
            
            initEsplora();

        } catch (error) {
            console.error(error);
            toast('❌ Errore: Riprova più tardi.');
        } finally {
            btn.textContent = '🚀 Pubblica';
            btn.disabled = false;
        }
    }

    function toast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg; t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    /* ── AUTH E AVVIO ── */
    function aggiornaNavbar() {
        const btnLogin = document.getElementById('navLoginBtn');
        if (!btnLogin) return;
        const loggato = getCookieSafe('username') !== null;
        if (loggato) { btnLogin.style.display = 'none'; }
    }

    document.addEventListener("DOMContentLoaded", function() {
        aggiornaNavbar();
        initEsplora();
    });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utenti — Appunti</title>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,700;0,900;1,400&family=Cabinet+Grotesk:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:      #0a0a0a;
            --surface: #111;
            --surface2:#181818;
            --border:  rgba(255,255,255,0.08);
            --border2: rgba(255,255,255,0.14);
            --text:    #f2f0ec;
            --muted:   rgba(242,240,236,0.45);
            --accent:  #f0c040;
            --nav-h:   60px;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Cabinet Grotesk', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ── NAVBAR ── */
        .nav {
            position: fixed; top: 0; left: 0; right: 0;
            height: var(--nav-h);
            background: rgba(10,10,10,0.97);
            backdrop-filter: blur(12px);
            display: flex; align-items: center;
            padding: 0 32px; gap: 28px;
            z-index: 100;
            border-bottom: 1px solid var(--border);
        }

        .nav__brand {
            font-family: 'Fraunces', serif;
            font-size: 1.3rem; font-weight: 900;
            color: var(--accent);
            text-decoration: none; white-space: nowrap;
        }

        .nav__links { list-style: none; display: flex; gap: 2px; flex: 1; }
        .nav__links a {
            padding: 6px 13px; border-radius: 8px;
            color: var(--muted);
            text-decoration: none; font-size: 0.87rem; font-weight: 700;
            transition: all .18s;
        }
        .nav__links a:hover { color: var(--text); background: rgba(255,255,255,0.07); }
        .nav__links a.active { color: var(--accent); }

        .nav__back {
            display: flex; align-items: center; gap: 7px;
            padding: 7px 14px; border-radius: 10px;
            background: rgba(255,255,255,0.07);
            border: 1px solid var(--border2);
            color: var(--muted);
            text-decoration: none; font-size: 0.84rem; font-weight: 800;
            transition: all .2s; white-space: nowrap;
            cursor: pointer;
        }
        .nav__back:hover { color: var(--text); background: rgba(255,255,255,0.12); }

        /* ════════════════════════════════════
           MODALITÀ RICERCA (no ?user=)
        ════════════════════════════════════ */

        .search-page {
            margin-top: var(--nav-h);
            min-height: calc(100vh - var(--nav-h));
            display: flex; flex-direction: column; align-items: center;
            padding: 60px 24px 80px;
        }

        .search-page__title {
            font-family: 'Fraunces', serif;
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 900;
            letter-spacing: -1px;
            margin-bottom: 8px;
            text-align: center;
        }

        .search-page__sub {
            font-size: 0.95rem; color: var(--muted);
            margin-bottom: 40px; text-align: center;
            font-weight: 500;
        }

        /* ── BARRA DI RICERCA ── */
        .search-box {
            width: 100%; max-width: 560px;
            position: relative;
            margin-bottom: 36px;
        }

        .search-box__input {
            width: 100%;
            background: var(--surface);
            border: 2px solid var(--border2);
            border-radius: 16px;
            color: var(--text);
            font-family: 'Cabinet Grotesk', sans-serif;
            font-size: 1.05rem; font-weight: 600;
            padding: 16px 58px 16px 20px;
            outline: none;
            transition: border-color .2s, box-shadow .2s, background .2s;
        }

        .search-box__input::placeholder { color: rgba(242,240,236,0.25); font-weight: 500; }

        .search-box__input:focus {
            border-color: var(--accent);
            background: rgba(240,192,64,0.04);
            box-shadow: 0 0 0 4px rgba(240,192,64,0.1);
        }

        .search-box__btn {
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
            width: 40px; height: 40px; border-radius: 10px;
            background: var(--accent); border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: transform .2s, box-shadow .2s;
            flex-shrink: 0;
        }
        .search-box__btn:hover { transform: translateY(-50%) scale(1.08); box-shadow: 0 4px 14px rgba(240,192,64,0.35); }
        .search-box__btn svg { color: #0a0a0a; }

        /* ── RISULTATI RICERCA ── */
        .results-container {
            width: 100%; max-width: 560px;
        }

        .results-label {
            font-size: 0.72rem; font-weight: 800;
            text-transform: uppercase; letter-spacing: 1.2px;
            color: var(--muted); margin-bottom: 12px;
            padding-left: 2px;
        }

        /* ── CARD UTENTE NEI RISULTATI ── */
        .user-result {
            display: flex; align-items: center; gap: 14px;
            padding: 14px 16px;
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 14px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: border-color .2s, background .2s, transform .2s;
            text-decoration: none; color: var(--text);
        }

        .user-result:hover {
            border-color: var(--accent);
            background: rgba(240,192,64,0.04);
            transform: translateX(4px);
        }

        /* Foto profilo */
        .user-result__photo {
            width: 52px; height: 52px;
            border-radius: 50%;
            background: var(--surface2);
            border: 2px solid var(--border2);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem;
            flex-shrink: 0;
            overflow: hidden;
        }

        .user-result__photo img {
            width: 100%; height: 100%; object-fit: cover;
        }

        /* Info */
        .user-result__info { flex: 1; min-width: 0; }

        .user-result__name {
            font-family: 'Fraunces', serif;
            font-size: 1rem; font-weight: 700;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        .user-result__username {
            font-size: 0.78rem; color: var(--accent);
            font-weight: 700; margin-top: 2px;
        }

        .user-result__school {
            font-size: 0.73rem; color: var(--muted);
            margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        /* Freccia */
        .user-result__arrow {
            font-size: 1rem; color: var(--muted);
            flex-shrink: 0;
            transition: transform .2s, color .2s;
        }
        .user-result:hover .user-result__arrow { transform: translateX(4px); color: var(--accent); }

        /* Nessun risultato / empty */
        .no-match {
            text-align: center; padding: 32px 20px;
            color: var(--muted); font-size: 0.9rem;
        }
        .no-match__icon { font-size: 2.4rem; margin-bottom: 10px; opacity: .4; }

        /* Stato iniziale */
        .search-hint {
            text-align: center; padding: 32px 20px;
            color: var(--muted); font-size: 0.88rem; line-height: 1.6;
        }
        .search-hint__icon { font-size: 2.8rem; margin-bottom: 12px; opacity: .3; }

        /* ════════════════════════════════════
           MODALITÀ PROFILO (?user=xxx)
        ════════════════════════════════════ */

        .cover {
            margin-top: var(--nav-h);
            height: 240px;
            position: relative; overflow: hidden;
            background: linear-gradient(135deg, #111 0%, #1a1a1a 100%);
        }

        .cover__pattern {
            position: absolute; inset: 0;
            background-image: radial-gradient(rgba(255,255,255,0.04) 1px, transparent 1px);
            background-size: 24px 24px;
        }

        .cover__grad {
            position: absolute; inset: 0;
            background: linear-gradient(to bottom, transparent 30%, rgba(10,10,10,0.9) 100%);
        }

        .profile-header {
            max-width: 860px;
            margin: -70px auto 0;
            padding: 0 32px;
            position: relative; z-index: 10;
            display: flex; align-items: flex-end; gap: 22px;
        }

        .profile-avatar {
            width: 110px; height: 110px;
            border-radius: 50%;
            background: var(--surface2);
            border: 4px solid var(--bg);
            display: flex; align-items: center; justify-content: center;
            font-size: 3rem; flex-shrink: 0;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            overflow: hidden;
        }
        .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }

        .profile-info { flex: 1; min-width: 0; padding-bottom: 12px; }

        .profile-name {
            font-family: 'Fraunces', serif;
            font-size: 2rem; font-weight: 900;
            letter-spacing: -1px; line-height: 1.1;
        }

        .profile-username { font-size: 0.9rem; color: var(--muted); font-weight: 700; margin-top: 3px; }
        .profile-username span { color: var(--accent); }
        .profile-school { font-size: 0.82rem; color: var(--muted); margin-top: 6px; }

        .profile-actions { padding-bottom: 12px; display: flex; gap: 8px; flex-shrink: 0; }

        .btn-follow {
            padding: 9px 22px;
            background: var(--accent); color: #0a0a0a;
            border: none; border-radius: 10px;
            font-family: 'Cabinet Grotesk', sans-serif;
            font-size: 0.87rem; font-weight: 800; cursor: pointer;
            transition: transform .2s, box-shadow .2s;
        }
        .btn-follow:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(240,192,64,0.3); }
        .btn-follow.following { background: var(--surface2); color: var(--text); border: 1px solid var(--border2); }

        .btn-share {
            padding: 9px 16px;
            background: var(--surface2); color: var(--muted);
            border: 1px solid var(--border2); border-radius: 10px;
            font-size: 0.87rem; font-weight: 800; cursor: pointer;
            transition: all .2s; font-family: 'Cabinet Grotesk', sans-serif;
        }
        .btn-share:hover { color: var(--text); background: rgba(255,255,255,0.12); }

        .main { max-width: 860px; margin: 0 auto; padding: 28px 32px 80px; }

        .bio-section {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 16px; padding: 22px 24px; margin-bottom: 20px;
        }

        .bio-text { font-size: 0.95rem; color: rgba(242,240,236,0.75); line-height: 1.65; font-weight: 500; }

        .bio-tags { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 14px; }

        .bio-tag {
            padding: 4px 13px; border-radius: 20px;
            font-size: 0.73rem; font-weight: 800;
            text-transform: uppercase; letter-spacing: 0.7px;
            border: 1px solid transparent;
        }

        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 28px; }

        .stat-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 14px; padding: 18px 20px;
            display: flex; flex-direction: column; gap: 3px;
        }

        .stat-card__n {
            font-family: 'Fraunces', serif;
            font-size: 2rem; font-weight: 900; color: var(--accent); line-height: 1;
        }

        .stat-card__l {
            font-size: 0.72rem; font-weight: 800;
            text-transform: uppercase; letter-spacing: 1px; color: var(--muted);
        }

        .tabs-bar { display: flex; gap: 6px; margin-bottom: 20px; }

        .tab-pill {
            background: none; border: 1.5px solid var(--border);
            border-radius: 30px; padding: 8px 20px;
            font-family: 'Cabinet Grotesk', sans-serif;
            font-size: 0.85rem; font-weight: 800; color: var(--muted); cursor: pointer;
            transition: all .2s; display: flex; align-items: center; gap: 7px;
        }
        .tab-pill:hover { border-color: var(--border2); color: var(--text); }
        .tab-pill.active { background: var(--text); color: #0a0a0a; border-color: var(--text); }
        .tab-pill .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; opacity: .5; }
        .tab-pill.active .dot { background: var(--accent); opacity: 1; }

        .tab-panel { display: none; }
        .tab-panel.active { display: block; animation: fadeIn .3s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .notes-grid { columns: 3; column-gap: 14px; }

        .note-card {
            break-inside: avoid; margin-bottom: 14px;
            background: var(--surface); border: 1.5px solid var(--border);
            border-radius: 14px; overflow: hidden; cursor: pointer;
            transition: transform .25s, box-shadow .25s, border-color .25s;
        }
        .note-card:hover { transform: translateY(-5px); box-shadow: 0 14px 40px rgba(0,0,0,0.4); border-color: var(--border2); }

        .note-card__thumb {
            height: 100px; display: flex; align-items: center; justify-content: center;
            position: relative; overflow: hidden;
        }
        .note-card__thumb-bg { position: absolute; inset: 0; opacity: .2; }
        .note-card__thumb-icon { font-size: 2.2rem; position: relative; z-index: 1; filter: drop-shadow(0 2px 8px rgba(0,0,0,.3)); }

        .note-card__body { padding: 12px 14px 14px; }

        .note-card__chip {
            display: inline-block; font-size: 0.62rem; font-weight: 800;
            text-transform: uppercase; letter-spacing: .8px;
            padding: 2px 9px; border-radius: 20px; margin-bottom: 6px;
        }

        .note-card__title {
            font-family: 'Fraunces', serif;
            font-size: 0.88rem; font-weight: 700; line-height: 1.3; color: var(--text);
        }

        .note-card__meta { font-size: 0.68rem; color: var(--muted); margin-top: 6px; }

        .info-row {
            display: flex; gap: 14px; align-items: center;
            padding: 14px 0; border-bottom: 1px solid var(--border);
        }
        .info-row:last-child { border-bottom: none; }

        .info-icon {
            width: 38px; height: 38px; border-radius: 10px;
            background: rgba(255,255,255,0.07); border: 1px solid var(--border2);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; flex-shrink: 0;
        }

        .info-label { font-size: 0.68rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 2px; }
        .info-value { font-size: 0.9rem; font-weight: 700; }

        /* ── SHARED ── */
        .empty { padding: 60px 20px; text-align: center; color: var(--muted); }
        .empty__icon { font-size: 3rem; margin-bottom: 14px; opacity: .4; }
        .empty p { font-size: 0.9rem; line-height: 1.6; }

        .not-found {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; min-height: calc(100vh - var(--nav-h));
            text-align: center; padding: 40px;
        }
        .not-found__icon { font-size: 5rem; margin-bottom: 24px; opacity: .4; }
        .not-found__title { font-family: 'Fraunces', serif; font-size: 2rem; font-weight: 900; margin-bottom: 10px; }
        .not-found__sub { font-size: 0.95rem; color: var(--muted); margin-bottom: 28px; }
        .not-found__btn {
            padding: 11px 28px; background: var(--accent); color: #0a0a0a;
            border: none; border-radius: 12px;
            font-family: 'Fraunces', serif; font-size: 1rem; font-weight: 900;
            cursor: pointer; text-decoration: none; display: inline-block;
            transition: transform .2s, box-shadow .2s;
        }
        .not-found__btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(240,192,64,.3); }

        .loading {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; min-height: calc(100vh - var(--nav-h));
            color: var(--muted); gap: 16px;
        }
        .spinner {
            width: 36px; height: 36px;
            border: 3px solid var(--border2);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin .8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .toast {
            position: fixed; bottom: 24px; right: 24px;
            background: var(--accent); color: #0a0a0a;
            padding: 11px 22px; border-radius: 12px;
            font-family: 'Fraunces', serif; font-weight: 700; font-size: 0.9rem;
            opacity: 0; transform: translateY(12px);
            transition: all .3s; pointer-events: none; z-index: 9999;
        }
        .toast.show { opacity: 1; transform: translateY(0); }

        /* ── RESPONSIVE ── */
        @media (max-width: 700px) {
            .profile-header { flex-direction: column; align-items: flex-start; padding: 0 16px; gap: 14px; }
            .profile-avatar { width: 80px; height: 80px; font-size: 2rem; }
            .profile-actions { padding-bottom: 0; }
            .stats-row { grid-template-columns: 1fr 1fr; }
            .notes-grid { columns: 2; }
            .main { padding: 20px 16px 60px; }
            .nav__links { display: none; }
            .cover { height: 160px; }
            .search-page { padding: 40px 16px 60px; }
        }
        @media (max-width: 480px) { .notes-grid { columns: 1; } }
    </style>
</head>
<body>

<nav class="nav">
    <a href="index.html" class="nav__brand">📚 Appunti</a>
    <ul class="nav__links">
        <li><a href="index.html">Home</a></li>
        <li><a href="esplora.html">Esplora</a></li>
        <li><a href="profilo.html">Profilo</a></li>
        <li><a href="utenti.html" class="active">Utenti</a></li>
        <li><a href="impostazioni.html">Impostazioni</a></li>
    </ul>
    <span class="nav__back" id="navBack" style="display:none" onclick="history.back()">← Indietro</span>
</nav>

<div id="pageContent">
    <div class="loading"><div class="spinner"></div></div>
</div>

<div class="toast" id="toast"></div>

<script>
    const coloriMateria = {
        "Matematica":"#f97316","Scienze":"#22c55e","Fisica":"#3b82f6",
        "Chimica":"#a855f7","Storia":"#ec4899","Geografia":"#14b8a6",
        "Italiano":"#f59e0b","Inglese":"#6366f1","Informatica":"#ef4444","Arte":"#0ea5e9",
        "Biologia":"#059669","Geometria":"#7c3aed"
    };

    const iconeMateria = {
        "Matematica":"∑","Scienze":"🔬","Fisica":"⚛️","Chimica":"🧪",
        "Storia":"📖","Geografia":"🌍","Italiano":"✏️","Inglese":"🗣️",
        "Informatica":"💻","Arte":"🎨","Biologia":"🧬","Geometria":"📐"
    };

    const username = new URLSearchParams(window.location.search).get('user') || '';

    // ════════════════════════════════════
    // MODALITÀ: RICERCA UTENTI (no ?user=)
    // ════════════════════════════════════
    function mostraModalitaRicerca() {
        document.title = 'Utenti — Appunti';
        document.getElementById('pageContent').innerHTML = `
            <div class="search-page">
                <div class="search-page__title">Cerca utenti</div>
                <div class="search-page__sub">Digita il nome o lo username di un utente registrato</div>

                <div class="search-box">
                    <input
                        class="search-box__input"
                        id="userSearchInput"
                        type="text"
                        placeholder="Es. Yedda, marco_r, Sara…"
                        autocomplete="off"
                        oninput="cercaUtenti(this.value)"
                    >
                    <button class="search-box__btn" onclick="cercaUtenti(document.getElementById('userSearchInput').value)">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <circle cx="11" cy="11" r="8"/>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                        </svg>
                    </button>
                </div>

                <div class="results-container" id="resultsContainer">
                    <div class="search-hint">
                        <div class="search-hint__icon">👥</div>
                        Inizia a scrivere per trovare un utente
                    </div>
                </div>
            </div>`;

        // Focus automatico sulla barra
        setTimeout(() => {
            const inp = document.getElementById('userSearchInput');
            if (inp) inp.focus();
        }, 100);
    }

    // Debounce per non chiamare l'API ad ogni tasto
    let debounceTimer;

    async function cercaUtenti(query) {
        const q = query.trim();
        const container = document.getElementById('resultsContainer');
        if (!container) return;

        // Se vuoto, mostra hint
        if (q.length === 0) {
            container.innerHTML = `
                <div class="search-hint">
                    <div class="search-hint__icon">👥</div>
                    Inizia a scrivere per trovare un utente
                </div>`;
            return;
        }

        // Se troppo corto (1 carattere), aspetta
        if (q.length < 2) return;

        // Debounce 300ms
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(async () => {
            // Spinner mentre cerca
            container.innerHTML = `<div style="text-align:center;padding:24px"><div class="spinner" style="margin:0 auto;width:28px;height:28px"></div></div>`;

            try {
                const res = await fetch(`/api/cerca-utenti?q=${encodeURIComponent(q)}`);
                const utenti = res.ok ? await res.json() : [];
                renderRisultati(utenti, q);
            } catch {
                renderRisultati([], q);
            }
        }, 300);
    }

    function renderRisultati(utenti, q) {
        const container = document.getElementById('resultsContainer');
        if (!container) return;

        if (utenti.length === 0) {
            container.innerHTML = `
                <div class="no-match">
                    <div class="no-match__icon">🔍</div>
                    Nessun utente trovato per "<strong>${q}</strong>"
                </div>`;
            return;
        }

        const html = utenti.map(u => {
            // Foto profilo: se c'è l'URL usa <img>, altrimenti emoji/iniziali
            const fotoHtml = u.foto_profilo_url
                ? `<img src="${u.foto_profilo_url}" alt="${u.nome}">`
                : `<span>${u.avatar || '👤'}</span>`;

            return `
                <a class="user-result" href="utenti.html?user=${encodeURIComponent(u.username)}">
                    <div class="user-result__photo">${fotoHtml}</div>
                    <div class="user-result__info">
                        <div class="user-result__name">${u.nome} ${u.cognome}</div>
                        <div class="user-result__username">@${u.username}</div>
                        ${u.scuola ? `<div class="user-result__school">🏫 ${u.scuola}</div>` : ''}
                    </div>
                    <div class="user-result__arrow">→</div>
                </a>`;
        }).join('');

        container.innerHTML = `
            <div class="results-label">${utenti.length} risultat${utenti.length === 1 ? 'o' : 'i'}</div>
            ${html}`;
    }

    // ════════════════════════════════════
    // MODALITÀ: PROFILO UTENTE (?user=xxx)
    // ════════════════════════════════════
    let isFollowing = false;
    let utente = null;

    async function caricaProfilo() {
        // Mostra bottone "Indietro" nella navbar
        document.getElementById('navBack').style.display = 'flex';

        try {
            const res = await fetch(`/api/utente?username=${encodeURIComponent(username)}`);

            if (res.status === 404) { mostraNotFound(username); return; }
            if (!res.ok) throw new Error('Errore server');

            utente = await res.json();
            document.title = `${utente.nome} ${utente.cognome} (@${utente.username}) — Appunti`;
            renderProfilo(utente);

            const resA = await fetch(`/api/appunti?username=${encodeURIComponent(username)}`);
            const appunti = resA.ok ? await resA.json() : [];
            renderAppunti(appunti);

        } catch {
            mostraNotFound(username);
        }
    }

    function renderProfilo(u) {
        const avatarHtml = u.foto_profilo_url
            ? `<img src="${u.foto_profilo_url}" alt="${u.nome}">`
            : (u.avatar || '👤');

        const tagsHtml = (u.materie || [])
            .map(m => `<span class="bio-tag" style="background:${coloriMateria[m]}22;color:${coloriMateria[m]};border-color:${coloriMateria[m]}44">${m}</span>`)
            .join('');

        document.getElementById('pageContent').innerHTML = `
            <div class="cover">
                <div class="cover__pattern"></div>
                <div class="cover__grad"></div>
            </div>

            <div class="profile-header">
                <div class="profile-avatar">${avatarHtml}</div>
                <div class="profile-info">
                    <div class="profile-name">${u.nome} ${u.cognome}</div>
                    <div class="profile-username">@<span>${u.username}</span></div>
                    ${u.scuola ? `<div class="profile-school">🏫 ${u.scuola}${u.anno ? ' · ' + u.anno : ''}</div>` : ''}
                </div>
                <div class="profile-actions">
                    <button class="btn-follow" id="followBtn" onclick="toggleFollow()">+ Segui</button>
                    <button class="btn-share" onclick="condividi()">↗ Condividi</button>
                </div>
            </div>

            <div class="main">
                <div class="bio-section">
                    <div class="bio-text">${u.bio || 'Nessuna bio disponibile.'}</div>
                    ${tagsHtml ? `<div class="bio-tags">${tagsHtml}</div>` : ''}
                </div>

                <div class="stats-row">
                    <div class="stat-card">
                        <div class="stat-card__n" id="statAppunti">—</div>
                        <div class="stat-card__l">📄 Appunti</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-card__n">${u.views >= 1000 ? (u.views/1000).toFixed(1)+'k' : (u.views || 0)}</div>
                        <div class="stat-card__l">👁 Visualizzazioni</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-card__n">${u.follower || 0}</div>
                        <div class="stat-card__l">👥 Follower</div>
                    </div>
                </div>

                <div class="tabs-bar">
                    <button class="tab-pill active" onclick="switchTab('appunti', this)">
                        <span class="dot"></span> Appunti pubblicati
                    </button>
                    <button class="tab-pill" onclick="switchTab('info', this)">
                        <span class="dot"></span> Info
                    </button>
                </div>

                <div class="tab-panel active" id="tab-appunti">
                    <div class="empty"><div class="spinner" style="margin:0 auto"></div></div>
                </div>

                <div class="tab-panel" id="tab-info">
                    <div class="bio-section">
                        ${u.scuola ? `<div class="info-row"><div class="info-icon">🏫</div><div><div class="info-label">Scuola</div><div class="info-value">${u.scuola}</div></div></div>` : ''}
                        ${u.anno  ? `<div class="info-row"><div class="info-icon">📅</div><div><div class="info-label">Anno</div><div class="info-value">${u.anno}</div></div></div>` : ''}
                        <div class="info-row"><div class="info-icon">👥</div><div><div class="info-label">Social</div><div class="info-value">${u.follower || 0} follower · ${u.seguiti || 0} seguiti</div></div></div>
                        <div class="info-row"><div class="info-icon">📧</div><div><div class="info-label">Membro dal</div><div class="info-value">${u.created_at ? new Date(u.created_at).toLocaleDateString('it-IT',{month:'long',year:'numeric'}) : '—'}</div></div></div>
                    </div>
                </div>
            </div>`;
    }

    function renderAppunti(appunti) {
        const tab = document.getElementById('tab-appunti');
        if (!tab) return;
        document.getElementById('statAppunti').textContent = appunti.length;

        if (appunti.length === 0) {
            tab.innerHTML = `<div class="empty"><div class="empty__icon">📭</div><p>Nessun appunto pubblicato ancora.</p></div>`;
            return;
        }

        tab.innerHTML = `<div class="notes-grid">${appunti.map(a => {
            const c = coloriMateria[a.materia] || '#888';
            const icon = iconeMateria[a.materia] || '📄';
            return `
                <div class="note-card">
                    <div class="note-card__thumb">
                        <div class="note-card__thumb-bg" style="background:radial-gradient(circle at 50% 40%,${c},transparent 72%)"></div>
                        <div class="note-card__thumb-icon">${icon}</div>
                    </div>
                    <div class="note-card__body">
                        <div class="note-card__chip" style="background:${c}22;color:${c};border:1px solid ${c}44">${a.materia}</div>
                        <div class="note-card__title">${a.titolo}</div>
                        <div class="note-card__meta">👁 ${a.views || 0} · ${a.data || ''}</div>
                    </div>
                </div>`;
        }).join('')}</div>`;
    }

    function mostraNotFound(u) {
        document.title = 'Utente non trovato — Appunti';
        document.getElementById('pageContent').innerHTML = `
            <div class="not-found">
                <div class="not-found__icon">🔍</div>
                <div class="not-found__title">Utente non trovato</div>
                <div class="not-found__sub">${u ? `Nessun utente con username <strong>"${u}"</strong>.` : 'Nessun username specificato.'}</div>
                <a href="utenti.html" class="not-found__btn">← Cerca utenti</a>
            </div>`;
    }

    // ── FUNZIONI PROFILO ──
    function toggleFollow() {
        if (!utente) return;
        isFollowing = !isFollowing;
        const btn = document.getElementById('followBtn');
        btn.textContent = isFollowing ? '✓ Seguito' : '+ Segui';
        btn.classList.toggle('following', isFollowing);
        toast(isFollowing ? `✅ Ora segui @${utente.username}` : `Hai smesso di seguire @${utente.username}`);
    }

    function condividi() {
        const url = window.location.href;
        if (navigator.share) {
            navigator.share({ title: utente ? `Profilo di ${utente.nome}` : 'Appunti', url });
        } else {
            navigator.clipboard.writeText(url).then(() => toast('🔗 Link copiato!'));
        }
    }

    function switchTab(id, btn) {
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-pill').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + id).classList.add('active');
        btn.classList.add('active');
    }

    function toast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg; t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2600);
    }

    // ── AVVIO ──
    if (username) {
        caricaProfilo();
    } else {
        mostraModalitaRicerca();
    }
</script>
</body>
</html>

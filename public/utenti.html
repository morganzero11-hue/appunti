<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utenti — Appunti</title>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,700;0,900;1,700&family=Cabinet+Grotesk:wght@400;500;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a; 
            --surface: #111111; 
            --surface2: #181818;
            --text: #f2f0ec; 
            --muted: rgba(242,240,236,0.45);
            --accent: #c8f060; 
            --accent2: #ff4d6d; 
            --nav-h: 62px;
            --radius: 16px;
            --border: rgba(255,255,255,0.05);
            --border2: rgba(255,255,255,0.14);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Cabinet Grotesk', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ─── NAVBAR ─── */
        .topnav { 
            position: fixed; top: 0; left: 0; right: 0; height: var(--nav-h); 
            background: rgba(10,10,10,0.95); backdrop-filter: blur(10px); 
            display: flex; align-items: center; padding: 0 32px; z-index: 1000; 
            border-bottom: 1px solid var(--border); 
        }
        .topnav__brand { 
            display: flex; align-items: center; gap: 12px; font-family: 'Fraunces', serif; 
            font-size: 1.5rem; font-weight: 900; color: var(--accent); text-decoration: none; margin-right: 30px; 
        }
        .topnav__links { list-style: none; display: flex; gap: 6px; flex: 1; margin: 0; padding: 0; }
        .topnav__links a { 
            color: var(--muted); text-decoration: none; font-size: 0.95rem; font-weight: 700; 
            padding: 8px 16px; border-radius: 8px; transition: all .2s; 
        }
        .topnav__links a:hover { color: var(--text); background: rgba(255,255,255,0.05); }
        .topnav__links a.active { color: var(--accent); }
        .topnav__login { 
            background: var(--accent); color: #0a0a0a; padding: 8px 24px; border-radius: 8px; 
            text-decoration: none; font-weight: 800; font-size: 0.95rem; transition: transform .2s; margin-left: auto; 
        }
        .topnav__login:hover { transform: scale(1.05); }
        
        .nav__back {
            display: none; align-items: center; gap: 8px;
            padding: 7px 16px; border-radius: 10px;
            background: var(--surface2); border: 1px solid var(--border2);
            color: var(--text); font-size: 0.85rem; font-weight: 800;
            cursor: pointer; transition: all .2s; white-space: nowrap; margin-left: auto;
        }
        .nav__back:hover { background: rgba(255,255,255,0.1); }

        @media (max-width: 768px) { .topnav__links { display: none; } }

        /* ─── LAYOUT RICERCA ─── */
        .search-page {
            margin-top: calc(var(--nav-h) + 60px);
            display: flex; flex-direction: column; align-items: center;
            padding: 0 24px 80px;
        }
        .search-page__title {
            font-family: 'Fraunces', serif; font-size: clamp(2.5rem, 6vw, 3.5rem); 
            font-weight: 900; letter-spacing: -1px; margin-bottom: 12px; text-align: center;
        }
        .search-page__sub {
            font-size: 1rem; color: var(--muted); margin-bottom: 48px; text-align: center; font-weight: 500;
        }

        .search-box {
            width: 100%; max-width: 600px; position: relative; margin-bottom: 40px;
        }
        .search-box__input {
            width: 100%; background: var(--surface); border: 2px solid var(--border2);
            border-radius: 18px; color: var(--text); font-family: 'Cabinet Grotesk', sans-serif;
            font-size: 1.1rem; font-weight: 600; padding: 18px 65px 18px 24px; outline: none;
            transition: all .2s;
        }
        .search-box__input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(200,240,96,0.1); }
        
        .search-box__btn {
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
            width: 44px; height: 44px; border-radius: 12px;
            background: var(--accent); border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: transform .2s;
        }
        .search-box__btn:hover { transform: translateY(-50%) scale(1.05); }

        /* ─── RISULTATI E CRONOLOGIA ─── */
        .results-container { width: 100%; max-width: 600px; }
        .results-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .results-label { font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin: 0; }
        .clear-history-btn { background: none; border: none; color: var(--accent2); font-size: 0.75rem; font-weight: 800; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: opacity .2s; }
        .clear-history-btn:hover { opacity: 0.7; }

        .user-result, .history-result {
            display: flex; align-items: center; gap: 16px; padding: 16px;
            background: var(--surface); border: 1.5px solid var(--border);
            border-radius: var(--radius); margin-bottom: 12px;
            text-decoration: none; color: var(--text); transition: all .2s;
        }
        .user-result:hover, .history-result:hover { border-color: var(--accent); transform: translateX(6px); background: var(--surface2); }
        
        .history-icon {
            width: 40px; height: 40px; border-radius: 50%;
            background: rgba(255,255,255,0.05); color: var(--muted);
            display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0;
        }
        
        .user-result__photo {
            width: 54px; height: 54px; border-radius: 50%;
            background: var(--surface2); border: 2px solid var(--border2);
            display: flex; align-items: center; justify-content: center;
            font-family: 'Fraunces', serif; font-size: 1.4rem; font-weight: 900; 
            color: var(--accent); overflow: hidden; flex-shrink: 0;
        }
        .user-result__photo img { width: 100%; height: 100%; object-fit: cover; }
        .user-result__name { font-family: 'Fraunces', serif; font-size: 1.1rem; font-weight: 800; }
        .user-result__username { color: var(--accent); font-size: 0.85rem; font-weight: 700; }

        /* ─── PROFILO UTENTE ─── */
        .cover { height: 220px; background: linear-gradient(135deg, #111 0%, #1c1c1c 100%); margin-top: var(--nav-h); position: relative; overflow: hidden; }
        .cover__pattern { position: absolute; inset: 0; background-image: radial-gradient(rgba(255,255,255,0.04) 1px, transparent 1px); background-size: 24px 24px; }
        .cover__grad { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 30%, rgba(10,10,10,0.95) 100%); }

        .profile-header { max-width: 900px; margin: -65px auto 0; padding: 0 32px; display: flex; align-items: flex-end; gap: 24px; position: relative; z-index: 10; }
        .profile-avatar { 
            width: 120px; height: 120px; border-radius: 50%; background: var(--surface2); 
            border: 4px solid var(--bg); overflow: hidden; display: flex; align-items: center; justify-content: center;
            font-family: 'Fraunces', serif; font-size: 3rem; color: var(--accent); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
        
        .profile-info { flex: 1; padding-bottom: 10px; }
        .profile-name { font-family: 'Fraunces', serif; font-size: 2.2rem; font-weight: 900; line-height: 1.1; }
        .profile-username-sub { font-size: 1rem; color: var(--muted); font-weight: 700; margin-top: 4px; }
        .profile-username-sub span { color: var(--accent); }

        .profile-actions { padding-bottom: 12px; }
        .btn-share { padding: 10px 20px; background: var(--surface2); color: var(--text); border: 1px solid var(--border2); border-radius: 12px; font-weight: 800; cursor: pointer; transition: all .2s; }
        .btn-share:hover { background: var(--accent); color: #000; border-color: var(--accent); }

        .main { max-width: 900px; margin: 40px auto; padding: 0 32px 80px; }

        .stats-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 40px; }
        .stat-card { background: var(--surface); padding: 24px; border-radius: var(--radius); border: 1px solid var(--border); }
        .stat-card__n { display: block; font-family: 'Fraunces', serif; font-size: 2rem; font-weight: 900; color: var(--accent); line-height: 1; margin-bottom: 6px; }
        .stat-card__l { font-size: 0.75rem; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: 1.2px; }

        /* ─── TABS SWITCH ─── */
        .tabs-container {
            display: flex; gap: 10px; margin-bottom: 24px;
            background: var(--surface); padding: 6px; border-radius: 12px;
            border: 1px solid var(--border); width: max-content;
        }
        .tab-btn {
            background: transparent; border: none; color: var(--muted);
            padding: 8px 20px; border-radius: 8px; font-family: 'Cabinet Grotesk', sans-serif;
            font-size: 0.9rem; font-weight: 800; cursor: pointer; transition: all .2s;
            display: flex; align-items: center; gap: 6px;
        }
        .tab-btn:hover { color: var(--text); }
        .tab-btn.active { background: rgba(200,240,96,0.1); color: var(--accent); }
        .tab-btn.active-podcast { background: rgba(255,77,109,0.1); color: var(--accent2); }
        
        /* ─── GRIGLIA APPUNTI & PODCAST ─── */
        .content-section { display: none; }
        .content-section.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .notes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .note-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); overflow: hidden; text-decoration: none; color: inherit; transition: all .25s; }
        .note-card:hover { transform: translateY(-6px); border-color: var(--accent); box-shadow: 0 12px 30px rgba(0,0,0,0.4); }
        .podcast-card:hover { border-color: var(--accent2); }
        
        .note-card__thumb { height: 120px; background: var(--surface2); display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .note-card__thumb-bg { position: absolute; inset: 0; opacity: 0.15; }
        .note-card__thumb-icon { font-size: 2.5rem; position: relative; z-index: 1; }
        .note-card__body { padding: 16px; }
        .note-card__chip { display: inline-block; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; padding: 3px 10px; border-radius: 20px; margin-bottom: 10px; letter-spacing: 0.5px; }
        .note-card__title { font-family: 'Fraunces', serif; font-size: 1.05rem; font-weight: 800; line-height: 1.3; margin-bottom: 6px; }
        .note-card__meta { font-size: 0.75rem; color: var(--muted); font-weight: 500; }

        /* Feedback */
        .loading { display: flex; justify-content: center; padding: 100px 0; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .empty { text-align: center; padding: 60px 20px; color: var(--muted); margin-bottom: 30px; }
        .toast { position: fixed; bottom: 30px; right: 30px; background: var(--accent); color: #000; padding: 12px 24px; border-radius: 12px; font-weight: 800; opacity: 0; transform: translateY(20px); transition: all .3s; z-index: 9999; }
        .toast.show { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>

<nav class="topnav">
    <a href="index.html" class="topnav__brand">📚 Appunti</a>
    <ul class="topnav__links">
        <li><a href="index.html">Home</a></li>
        <li><a href="esplora.html">Esplora</a></li>
        <li><a href="profilo.html">Profilo</a></li>
        <li><a href="utenti.html" class="active">Utenti</a></li>
        <li><a href="podcast.html">Podcast</a></li>
        <li><a href="impostazioni.html">Impostazioni</a></li>
    </ul>
    
    <a href="login.html" class="topnav__login" id="navLoginBtn">Accedi</a>
    <div class="nav__back" id="navBack" onclick="window.location.href='utenti.html'">← Torna alla ricerca</div>
</nav>

<div id="pageContent">
    <div class="loading"><div class="spinner"></div></div>
</div>

<div class="toast" id="toast"></div>

<script>
    // --- UTILITY E NAVBAR ---
    function getCookieSafe(name) {
        let value = `; ${document.cookie}`;
        let parts = value.split(`; ${name}=`);
        if (parts.length === 2) return parts.pop().split(';').shift();
        return null;
    }

    function aggiornaNavbar() {
        const btnLogin = document.getElementById('navLoginBtn');
        if (getCookieSafe('username')) btnLogin.style.display = 'none';
    }

    const coloriMateria = {
        "Matematica":"#f97316","Scienze":"#22c55e","Fisica":"#3b82f6","Chimica":"#a855f7",
        "Storia":"#ec4899","Geografia":"#14b8a6","Italiano":"#f59e0b","Inglese":"#6366f1",
        "Informatica":"#ef4444","Arte":"#0ea5e9","Biologia":"#059669","Geometria":"#7c3aed"
    };
    const iconeMateria = {
        "Matematica":"∑","Scienze":"🔬","Fisica":"⚛️","Chimica":"🧪","Storia":"📖",
        "Geografia":"🌍","Italiano":"✏️","Inglese":"🗣️","Informatica":"💻","Arte":"🎨",
        "Biologia":"🧬","Geometria":"📐"
    };

    const usernameUrl = new URLSearchParams(window.location.search).get('user') || '';

    // --- GESTIONE CRONOLOGIA ---
    function getCronologia() {
        return JSON.parse(localStorage.getItem('searchHistory') || '[]');
    }

    function aggiungiACronologia(userObj) {
        let history = getCronologia();
        history = history.filter(u => u.username !== userObj.username);
        history.unshift(userObj);
        if (history.length > 5) history.pop();
        localStorage.setItem('searchHistory', JSON.stringify(history));
    }

    function pulisciCronologia() {
        localStorage.removeItem('searchHistory');
        gestisciInput(document.getElementById('userInput'));
    }

    function generaHtmlUtente(u, isHistory = false) {
        const onclickAttr = `onclick="aggiungiACronologia({nome: '${u.nome.replace(/'/g, "\\'")}', cognome: '${u.cognome ? u.cognome.replace(/'/g, "\\'") : ''}', username: '${u.username}', foto_profilo_url: '${u.foto_profilo_url || ''}'})"`;
        
        return `
            <a class="${isHistory ? 'history-result' : 'user-result'}" href="utenti.html?user=${u.username}" ${onclickAttr}>
                ${isHistory ? '<div class="history-icon">🕒</div>' : `
                <div class="user-result__photo">
                    ${u.foto_profilo_url ? `<img src="${u.foto_profilo_url}">` : u.nome.charAt(0).toUpperCase()}
                </div>
                `}
                <div>
                    <div class="user-result__name">${u.nome} ${u.cognome || ''}</div>
                    <div class="user-result__username">@${u.username}</div>
                </div>
            </a>`;
    }

    // --- MODALITÀ: RICERCA ---
    function mostraRicerca() {
        document.title = 'Cerca Utenti — Appunti';
        document.getElementById('navBack').style.display = 'none';
        document.getElementById('pageContent').innerHTML = `
            <div class="search-page">
                <h1 class="search-page__title">Cerca utenti</h1>
                <p class="search-page__sub">Trova altri studenti e scopri i loro contenuti pubblicati</p>
                <div class="search-box">
                    <input class="search-box__input" id="userInput" type="text" placeholder="Nome o @username..." oninput="gestisciInput(this)" onclick="gestisciInput(this)" autocomplete="off">
                    <button class="search-box__btn" onclick="eseguiRicerca(document.getElementById('userInput').value)">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="3" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    </button>
                </div>
                <div class="results-container" id="risultati">
                    <div class="empty">Inizia a scrivere per cercare qualcuno...</div>
                </div>
            </div>`;
        
        const inputVal = document.getElementById('userInput').value;
        if(inputVal.length > 0) eseguiRicerca(inputVal);
        else mostraSuggerimenti();
    }

    let timer;
    function gestisciInput(inputEl) {
        const val = inputEl.value.trim();
        clearTimeout(timer);
        
        if (val.length === 0) {
            mostraSuggerimenti();
            return;
        }
        timer = setTimeout(() => eseguiRicerca(val), 300);
    }

    function mostraSuggerimenti() {
        const box = document.getElementById('risultati');
        const history = getCronologia();

        if (history.length > 0) {
            box.innerHTML = `
                <div class="results-header">
                    <h3 class="results-label">Ricerche Recenti</h3>
                    <button class="clear-history-btn" onclick="pulisciCronologia()">Cancella</button>
                </div>
                ${history.map(u => generaHtmlUtente(u, true)).join('')}
            `;
        } else {
            box.innerHTML = `<div class="empty">Inizia a scrivere per cercare qualcuno...</div>`;
        }
    }

    async function eseguiRicerca(q) {
        const box = document.getElementById('risultati');
        if (!q.trim()) {
            mostraSuggerimenti();
            return;
        }

        box.innerHTML = `<div class="loading"><div class="spinner"></div></div>`;
        try {
            const res = await fetch(`/api/cerca-utenti?q=${encodeURIComponent(q)}`);
            const utenti = await res.json();
            
            if (utenti.length === 0) {
                box.innerHTML = `<div class="empty">Nessun utente trovato per "${q}"</div>`;
                return;
            }
            box.innerHTML = `<div class="results-header"><h3 class="results-label">Risultati della ricerca</h3></div>` 
                            + utenti.map(u => generaHtmlUtente(u, false)).join('');
        } catch (e) { 
            box.innerHTML = `<div class="empty">Errore di connessione al server.</div>`; 
        }
    }

    // --- SWITCH TABS ---
    function showTab(tabName) {
        // Nascondi le sezioni
        document.getElementById('section-appunti').classList.remove('active');
        document.getElementById('section-podcast').classList.remove('active');
        
        // Disattiva i bottoni
        document.getElementById('btn-tab-appunti').classList.remove('active');
        document.getElementById('btn-tab-podcast').classList.remove('active', 'active-podcast');
        
        if (tabName === 'appunti') {
            document.getElementById('section-appunti').classList.add('active');
            document.getElementById('btn-tab-appunti').classList.add('active');
        } else if (tabName === 'podcast') {
            document.getElementById('section-podcast').classList.add('active');
            document.getElementById('btn-tab-podcast').classList.add('active-podcast');
        }
    }

    // --- MODALITÀ: PROFILO ---
    async function caricaProfilo() {
        document.getElementById('navBack').style.display = 'flex';
        try {
            const [resU, resA, resP] = await Promise.all([
                fetch(`/api/utente?username=${encodeURIComponent(usernameUrl)}`),
                fetch(`/api/appunti?username=${encodeURIComponent(usernameUrl)}`),
                fetch(`/api/podcast?username=${encodeURIComponent(usernameUrl)}`) 
            ]);
            
            if (!resU.ok) { mostraNotFound(); return; }
            
            const u = await resU.json();
            document.title = `${u.nome} ${u.cognome} (@${u.username}) — Appunti`;

            const appunti = resA.ok ? await resA.json() : [];
            const podcast = resP.ok ? await resP.json() : []; 

            renderProfiloHtml(u, appunti, podcast);
        } catch (e) { mostraNotFound(); }
    }

    function renderProfiloHtml(u, appunti, podcast) {
        const data = new Date(u.created_at).toLocaleDateString('it-IT', { day:'numeric', month:'long', year:'numeric' });
        
        document.getElementById('pageContent').innerHTML = `
            <div class="cover">
                <div class="cover__pattern"></div>
                <div class="cover__grad"></div>
            </div>
            <div class="profile-header">
                <div class="profile-avatar">
                    ${u.foto_profilo_url ? `<img src="${u.foto_profilo_url}">` : u.nome.charAt(0).toUpperCase()}
                </div>
                <div class="profile-info">
                    <h1 class="profile-name">${u.nome} ${u.cognome}</h1>
                    <div class="profile-username-sub">@<span>${u.username}</span> • Iscritto il ${data}</div>
                </div>
                <div class="profile-actions">
                    <button class="btn-share" onclick="condividi('${u.nome.replace(/'/g, "\\'")}')">↗ Condividi</button>
                </div>
            </div>
            <div class="main">
                <div class="stats-row">
                    <div class="stat-card">
                        <span class="stat-card__n">${appunti.length + podcast.length}</span>
                        <span class="stat-card__l">Contenuti totali</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-card__n" style="font-size: 1.25rem; word-break: break-word;">${u.scuola || 'Nessuna'}</span>
                        <span class="stat-card__l">Scuola</span>
                    </div>
                </div>
                
                <div class="tabs-container">
                    <button class="tab-btn active" id="btn-tab-appunti" onclick="showTab('appunti')">📄 Appunti</button>
                    <button class="tab-btn" id="btn-tab-podcast" onclick="showTab('podcast')">🎙️ Podcast</button>
                </div>

                <div id="section-appunti" class="content-section active">
                    <div class="notes-grid">
                        ${appunti.map(a => {
                            const c = coloriMateria[a.materia] || '#888';
                            const icon = iconeMateria[a.materia] || '📄';
                            return `
                            <a href="esplora.html?focus=${a.id}" class="note-card">
                                <div class="note-card__thumb">
                                    <div class="note-card__thumb-bg" style="background:${a.cover_url ? `url('${a.cover_url}') center/cover` : `radial-gradient(circle, ${c}, transparent)`}; opacity: ${a.cover_url ? 0.4 : 0.15}"></div>
                                    <div class="note-card__thumb-icon">${icon}</div>
                                </div>
                                <div class="note-card__body">
                                    <div class="note-card__chip" style="background:${c}20; color:${c}; border:1px solid ${c}40">${a.materia}</div>
                                    <div class="note-card__title">${a.titolo}</div>
                                    <div class="note-card__meta">Visualizza appunto</div>
                                </div>
                            </a>`;
                        }).join('')}
                    </div>
                    ${appunti.length === 0 ? '<div class="empty">L\'utente non ha ancora caricato appunti.</div>' : ''}
                </div>

                <div id="section-podcast" class="content-section">
                    <div class="notes-grid">
                        ${podcast.map(p => `
                            <a href="podcast.html?id=${p.id}" class="note-card podcast-card">
                                <div class="note-card__thumb" style="background: var(--surface2);">
                                    <div class="note-card__thumb-bg" style="background: radial-gradient(circle, var(--accent2), transparent); opacity: 0.15"></div>
                                    <div class="note-card__thumb-icon">🎙️</div>
                                </div>
                                <div class="note-card__body">
                                    <div class="note-card__chip" style="background:rgba(255,77,109,0.15); color:var(--accent2); border:1px solid rgba(255,77,109,0.3)">Podcast</div>
                                    <div class="note-card__title">${p.titolo}</div>
                                    <div class="note-card__meta">Ascolta ora</div>
                                </div>
                            </a>
                        `).join('')}
                    </div>
                    ${podcast.length === 0 ? '<div class="empty">L\'utente non ha ancora caricato podcast.</div>' : ''}
                </div>
            </div>`;
    }

    function mostraNotFound() {
        document.getElementById('pageContent').innerHTML = `
            <div class="empty" style="margin-top:100px">
                <h1 style="font-family:Fraunces; font-size:3rem">404</h1>
                <p>Utente non trovato.</p>
                <a href="utenti.html" style="color:var(--accent); font-weight:800; text-decoration:none">Torna alla ricerca</a>
            </div>`;
    }

    function condividi(nome) {
        const url = window.location.href;
        if (navigator.share) {
            navigator.share({ title: `Profilo di ${nome} su Appunti`, url });
        } else {
            navigator.clipboard.writeText(url).then(() => {
                const t = document.getElementById('toast');
                t.textContent = "Link copiato negli appunti!";
                t.classList.add('show');
                setTimeout(() => t.classList.remove('show'), 3000);
            });
        }
    }

    document.addEventListener("DOMContentLoaded", () => {
        aggiornaNavbar();
        if (usernameUrl) caricaProfilo();
        else mostraRicerca();
    });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Utenti — Appunti</title>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,700;0,900;1,700&family=Cabinet+Grotesk:wght@400;500;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* TEMA SCURO (DEFAULT) */
            --bg: #0a0a0a; 
            --surface: #111111; 
            --surface2: #181818;
            --text: #f2f0ec; 
            --muted: rgba(242,240,236,0.45);
            --accent: #c8f060; 
            --accent2: #ff4d6d; 
            --nav-h: 62px;
            --radius: 16px;
            --border: rgba(255,255,255,0.05);
            --border2: rgba(255,255,255,0.14);
            --shadow-color: rgba(200,240,96,0.15);
            --stats-shadow: rgba(0,0,0,0.5);
            --card-shadow: rgba(0,0,0,0.4);
            --audio-invert: invert(0);
        }

        /* ─── VARIABILI TEMA CHIARO ─── */
        body.light-theme {
            --bg: #f8f9fa; 
            --surface: #ffffff; 
            --surface2: #f1f3f5;
            --text: #1a1a1a; 
            --muted: rgba(0,0,0,0.55);
            --accent: #a3cc2b;
            --accent2: #e63950;
            --border: rgba(0,0,0,0.08);
            --border2: rgba(0,0,0,0.15);
            --shadow-color: rgba(163,204,43,0.3);
            --stats-shadow: rgba(0,0,0,0.05);
            --card-shadow: rgba(0,0,0,0.08);
            --audio-invert: invert(0.9) hue-rotate(180deg);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Cabinet Grotesk', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 40px;
            transition: background-color 0.3s, color 0.3s;
        }

        /* ─── NAVBAR ─── */
        .topnav { 
            position: fixed; top: 0; left: 0; right: 0; height: var(--nav-h); 
            background: rgba(var(--bg-rgb, 10,10,10), 0.95); backdrop-filter: blur(10px); 
            display: flex; align-items: center; padding: 0 32px; z-index: 1000; 
            border-bottom: 1px solid var(--border); 
            transition: background-color 0.3s;
        }
        body.light-theme .topnav { background: rgba(248, 249, 250, 0.95); }

        .topnav__brand { 
            display: flex; align-items: center; gap: 12px; font-family: 'Fraunces', serif; 
            font-size: 1.5rem; font-weight: 900; color: var(--accent); text-decoration: none; margin-right: 30px; 
            letter-spacing: -0.4px;
        }
        .topnav__links { list-style: none; display: flex; gap: 6px; flex: 1; margin: 0; padding: 0; }
        .topnav__links a { 
            color: var(--muted); text-decoration: none; font-size: 0.95rem; font-weight: 700; 
            padding: 8px 16px; border-radius: 8px; transition: all .2s; 
        }
        .topnav__links a:hover { color: var(--text); background: var(--surface2); }
        .topnav__links a.active { color: var(--accent); background: rgba(200,240,96,0.08); }
        body.light-theme .topnav__links a.active { background: rgba(163,204,43,0.15); }
        
        .topnav__login { 
            background: var(--accent); color: #fff; padding: 8px 24px; border-radius: 8px; 
            text-decoration: none; font-weight: 800; font-size: 0.95rem; transition: transform .2s; margin-left: auto; 
        }
        body:not(.light-theme) .topnav__login { color: #0a0a0a; }
        .topnav__login:hover { transform: scale(1.05); }
        
        .nav__back {
            display: none; align-items: center; gap: 8px;
            padding: 7px 16px; border-radius: 10px;
            background: var(--surface2); border: 1px solid var(--border2);
            color: var(--text); font-size: 0.85rem; font-weight: 800;
            cursor: pointer; transition: all .2s; white-space: nowrap; margin-left: auto;
        }
        .nav__back:hover { background: rgba(255,255,255,0.1); }
        body.light-theme .nav__back:hover { background: rgba(0,0,0,0.05); }

        /* ─── LAYOUT RICERCA ─── */
        .search-page {
            margin-top: calc(var(--nav-h) + 60px);
            display: flex; flex-direction: column; align-items: center;
            padding: 0 24px 80px;
        }
        .search-page__title {
            font-family: 'Fraunces', serif; font-size: clamp(2.5rem, 6vw, 3.5rem); 
            font-weight: 900; letter-spacing: -1px; margin-bottom: 12px; text-align: center;
        }
        .search-page__sub {
            font-size: 1rem; color: var(--muted); margin-bottom: 48px; text-align: center; font-weight: 500;
        }

        .search-box {
            width: 100%; max-width: 600px; position: relative; margin-bottom: 40px;
        }
        .search-box__input {
            width: 100%; background: var(--surface); border: 2px solid var(--border2);
            border-radius: 18px; color: var(--text); font-family: 'Cabinet Grotesk', sans-serif;
            font-size: 1.1rem; font-weight: 600; padding: 18px 65px 18px 24px; outline: none;
            transition: all .2s;
        }
        .search-box__input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(200,240,96,0.1); }
        body.light-theme .search-box__input:focus { box-shadow: 0 0 0 4px rgba(163,204,43,0.15); }
        
        .search-box__btn {
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
            width: 44px; height: 44px; border-radius: 12px;
            background: var(--accent); border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: transform .2s;
        }
        .search-box__btn:hover { transform: translateY(-50%) scale(1.05); }

        /* ─── RISULTATI E CRONOLOGIA ─── */
        .results-container { width: 100%; max-width: 600px; }
        .results-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .results-label { font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin: 0; }
        .clear-history-btn { background: none; border: none; color: var(--accent2); font-size: 0.75rem; font-weight: 800; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: opacity .2s; }
        .clear-history-btn:hover { opacity: 0.7; }

        .user-result, .history-result {
            display: flex; align-items: center; gap: 16px; padding: 16px;
            background: var(--surface); border: 1.5px solid var(--border);
            border-radius: var(--radius); margin-bottom: 12px;
            text-decoration: none; color: var(--text); transition: all .2s;
        }
        .user-result:hover, .history-result:hover { border-color: var(--accent); transform: translateX(6px); background: var(--surface2); }
        
        .history-icon {
            width: 40px; height: 40px; border-radius: 50%;
            background: rgba(255,255,255,0.05); color: var(--muted);
            display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0;
        }
        body.light-theme .history-icon { background: rgba(0,0,0,0.05); }
        
        .user-result__photo {
            width: 54px; height: 54px; border-radius: 50%;
            background: var(--surface2); border: 2px solid var(--border2);
            display: flex; align-items: center; justify-content: center;
            font-family: 'Fraunces', serif; font-size: 1.4rem; font-weight: 900; 
            color: var(--accent); overflow: hidden; flex-shrink: 0;
        }
        .user-result__photo img { width: 100%; height: 100%; object-fit: cover; }
        .user-result__name { font-family: 'Fraunces', serif; font-size: 1.1rem; font-weight: 800; }

        /* ─── PROFILO UTENTE E BOTTONE FOLLOW ─── */
        .cover { height: 220px; background: linear-gradient(135deg, #111 0%, #1c1c1c 100%); margin-top: var(--nav-h); position: relative; overflow: hidden; }
        body.light-theme .cover { background: linear-gradient(135deg, #e9ecef 0%, #f1f3f5 100%); }
        .cover__pattern { position: absolute; inset: 0; background-image: radial-gradient(rgba(255,255,255,0.04) 1px, transparent 1px); background-size: 24px 24px; }
        body.light-theme .cover__pattern { background-image: radial-gradient(rgba(0,0,0,0.04) 1px, transparent 1px); }
        .cover__grad { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 30%, rgba(10,10,10,0.95) 100%); }
        body.light-theme .cover__grad { background: linear-gradient(to bottom, transparent 30%, rgba(248,249,250,0.95) 100%); }

        .profile-header { max-width: 900px; margin: -65px auto 0; padding: 0 32px; display: flex; align-items: flex-end; gap: 24px; position: relative; z-index: 10; }
        .profile-avatar { 
            width: 120px; height: 120px; border-radius: 50%; background: var(--surface2); 
            border: 4px solid var(--bg); overflow: hidden; display: flex; align-items: center; justify-content: center;
            font-family: 'Fraunces', serif; font-size: 3rem; color: var(--accent); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            flex-shrink: 0; /* Assicura che l'avatar non si rimpicciolisca */
        }
        body.light-theme .profile-avatar { box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
        
        .profile-info { flex: 1; padding-bottom: 10px; }
        .profile-name { font-family: 'Fraunces', serif; font-size: 2.2rem; font-weight: 900; line-height: 1.1; word-break: break-word; }
        .profile-username-sub { font-size: 1rem; color: var(--muted); font-weight: 700; margin-top: 4px; }

        .profile-actions { padding-bottom: 12px; display: flex; gap: 10px; flex-wrap: wrap; }
        .btn-share { padding: 10px 20px; background: var(--surface2); color: var(--text); border: 1px solid var(--border2); border-radius: 12px; font-weight: 800; cursor: pointer; transition: all .2s; }
        .btn-share:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
        body:not(.light-theme) .btn-share:hover { color: #000; }
        
        /* Stili dinamici per il tasto Segui / Smetti di seguire */
        .btn-follow { background: var(--accent); color: #0a0a0f; border-color: var(--accent); width: 160px; text-align: center; }
        body.light-theme .btn-follow { color: #fff; }
        .btn-follow.following { background: transparent; color: var(--text); border-color: var(--border2); }
        body.light-theme .btn-follow.following { color: var(--text); border-color: var(--border2); }
        
        /* Effetto hover rosso quando segui già */
        .btn-follow.following:hover { background: rgba(255,77,109,0.1); color: var(--accent2); border-color: rgba(255,77,109,0.3); }

        .main { max-width: 900px; margin: 40px auto; padding: 0 32px 80px; }

        /* GRID A 4 COLONNE PER LE STATISTICHE */
        .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 40px; }
        
        .stat-card { background: var(--surface); padding: 24px; border-radius: var(--radius); border: 1px solid var(--border); box-shadow: 0 10px 30px var(--stats-shadow); }
        .stat-card__n { display: block; font-family: 'Fraunces', serif; font-size: 2rem; font-weight: 900; color: var(--accent); line-height: 1; margin-bottom: 6px; }
        .stat-card__l { font-size: 0.75rem; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: 1.2px; }

        /* ─── TABS SWITCH E GRIGLIA ─── */
        .tabs-container {
            display: flex; gap: 10px; margin-bottom: 24px;
            background: var(--surface); padding: 6px; border-radius: 12px;
            border: 1px solid var(--border); width: max-content;
        }
        .tab-btn {
            background: transparent; border: none; color: var(--muted);
            padding: 8px 20px; border-radius: 8px; font-family: 'Cabinet Grotesk', sans-serif;
            font-size: 0.9rem; font-weight: 800; cursor: pointer; transition: all .2s;
            display: flex; align-items: center; gap: 6px;
        }
        .tab-btn:hover { color: var(--text); background: var(--surface2); }
        .tab-btn.active { background: rgba(200,240,96,0.1); color: var(--accent); }
        body.light-theme .tab-btn.active { background: rgba(163,204,43,0.15); }
        .tab-btn.active-podcast { background: rgba(255,77,109,0.1); color: var(--accent2); }
        
        .content-section { display: none; }
        .content-section.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .notes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .note-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; text-decoration: none; color: inherit; transition: all .25s; }
        .note-card:hover { transform: translateY(-6px); border-color: var(--accent); box-shadow: 0 16px 40px var(--card-shadow), 0 0 0 1px rgba(200,240,96,0.08); }
        body.light-theme .note-card:hover { border-color: var(--accent); box-shadow: 0 16px 40px var(--card-shadow), 0 0 0 1px rgba(163,204,43,0.2); }
        .podcast-card:hover { border-color: var(--accent2); }
        
        .note-card__thumb { height: 120px; background: var(--surface2); display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .note-card__thumb-bg { position: absolute; inset: 0; opacity: 0.15; }
        .note-card__thumb-icon { font-size: 2.5rem; position: relative; z-index: 1; }
        .note-card__body { padding: 16px; }
        .note-card__chip { display: inline-block; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; padding: 3px 10px; border-radius: 20px; margin-bottom: 10px; letter-spacing: 0.5px; }
        .note-card__title { font-family: 'Fraunces', serif; font-size: 1.05rem; font-weight: 800; line-height: 1.3; margin-bottom: 6px; }
        .note-card__meta { font-size: 0.75rem; color: var(--muted); font-weight: 500; }

        /* ─── PLAYLISTS STYLES ─── */
        .playlist-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; transition: all .3s; cursor: pointer; }
        .playlist-card:hover { transform: translateY(-4px); border-color: rgba(200,240,96,0.2); box-shadow: 0 12px 30px var(--card-shadow); }
        body.light-theme .playlist-card:hover { border-color: var(--accent); }
        .playlist-card__cover { height: 100px; background: linear-gradient(135deg, var(--surface2) 0%, var(--surface3) 100%); display: flex; align-items: center; justify-content: center; font-size: 2.8rem; position: relative; overflow: hidden; transition: background 0.3s; }
        .playlist-card__cover::after { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at 30% 30%, rgba(200,240,96,0.06), transparent 70%); }
        body.light-theme .playlist-card__cover::after { background: radial-gradient(circle at 30% 30%, rgba(163,204,43,0.1), transparent 70%); }
        .playlist-card__body { padding: 14px 16px; }
        .playlist-card__title { font-family: 'Fraunces', serif; font-size: 1.1rem; font-weight: 800; margin-bottom: 4px; letter-spacing: -0.2px; }
        .playlist-card__count { font-size: 0.75rem; color: var(--muted); font-weight: 600; }
        .playlist-card__btn { display: block; width: 100%; margin-top: 10px; padding: 8px; text-align: center; border-radius: 8px; background: rgba(200,240,96,0.1); color: var(--accent); border: 1px solid rgba(200,240,96,0.2); font-family: 'Cabinet Grotesk', sans-serif; font-size: 0.8rem; font-weight: 800; cursor: pointer; transition: background .2s; }
        body.light-theme .playlist-card__btn { background: rgba(163,204,43,0.1); border-color: rgba(163,204,43,0.25); }
        .playlist-card__btn:hover { background: rgba(200,240,96,0.18); }
        body.light-theme .playlist-card__btn:hover { background: rgba(163,204,43,0.18); }
        .playlist-back-row { display: flex; align-items: center; gap: 14px; margin-bottom: 24px; }
        .playlist-back-btn { padding: 8px 16px; border-radius: 10px; background: var(--surface2); color: var(--text); border: 1px solid var(--border2); font-family: 'Cabinet Grotesk', sans-serif; font-size: 0.85rem; font-weight: 800; cursor: pointer; transition: background .2s; }
        .playlist-back-btn:hover { background: var(--surface3); }
        .playlist-back-title { font-family: 'Fraunces', serif; font-size: 1.4rem; font-weight: 900; letter-spacing: -0.3px; }

        /* Feedback */
        .loading { display: flex; justify-content: center; padding: 100px 0; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .empty { text-align: center; padding: 60px 20px; color: var(--muted); margin-bottom: 30px; }
        .toast { position: fixed; bottom: 30px; right: 30px; background: var(--accent); color: #fff; padding: 12px 24px; border-radius: 12px; font-weight: 800; opacity: 0; transform: translateY(20px); transition: all .3s; z-index: 9999; }
        body:not(.light-theme) .toast { color: #000; }
        .toast.show { opacity: 1; transform: translateY(0); }

        /* ─── RESPONSIVE (SMARTPHONE) ─── */
        @media (max-width: 768px) { 
            /* Navbar orizzontale scrollabile */
            .topnav { 
                height: auto; 
                padding: 12px 16px; 
                flex-wrap: wrap; 
                gap: 12px;
            }
            .topnav__brand { margin-right: auto; }
            .topnav__login { padding: 6px 16px; font-size: 0.85rem; margin-left: auto; }
            .nav__back { margin-left: auto; } /* Mantiene il tasto back allineato a destra */
            .topnav__links { 
                display: flex; 
                width: 100%; 
                overflow-x: auto; 
                scrollbar-width: none; 
                gap: 8px;
            }
            .topnav__links::-webkit-scrollbar { display: none; }
            .topnav__links a { white-space: nowrap; padding: 6px 12px; }

            /* Ricerca */
            .search-page { margin-top: 120px; padding: 0 16px 40px; }
            
            /* Profilo Utente: Riorganizza header */
            .profile-header {
                flex-direction: column;
                align-items: center;
                text-align: center;
                margin-top: -50px;
                padding: 0 16px;
                gap: 16px;
            }
            .profile-avatar { width: 100px; height: 100px; font-size: 2.2rem; }
            .profile-name { font-size: 1.8rem; }
            
            /* Bottoni centrali e a larghezza piena */
            .profile-actions { justify-content: center; width: 100%; }
            .btn-follow { flex: 1; min-width: 140px; }

            /* Main and Grids */
            .main { padding: 0 16px 40px; margin-top: 24px; }
            .stats-row { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .stat-card { padding: 16px; }
            .stat-card__n { font-size: 1.6rem; }
            
            /* Tabs scrollabili */
            .tabs-container {
                max-width: 100%;
                overflow-x: auto;
                scrollbar-width: none;
            }
            .tabs-container::-webkit-scrollbar { display: none; }
            .tab-btn { white-space: nowrap; }

            .notes-grid { grid-template-columns: 1fr; gap: 16px; }
        }
    </style>
</head>

<nav class="topnav">
    <a href="index.html" class="topnav__brand">📚 Appunti</a>
    <ul class="topnav__links">
        <li><a href="index.html">Home</a></li>

        <li><a href="profilo.html">Profilo</a></li>

        <li><a href="impostazioni.html">Impostazioni</a></li>
    </ul>
    
    <a href="login.html" class="topnav__login" id="navLoginBtn">Accedi</a>
    <div class="nav__back" id="navBack" onclick="window.location.href='utenti.html'">← Torna alla ricerca</div>
</nav>

<div id="pageContent">
    <div class="loading"><div class="spinner"></div></div>
</div>

<div class="toast" id="toast"></div>

<script>
    // Applico il tema al body a caricamento DOM per sicurezza
    document.addEventListener("DOMContentLoaded", () => {
        if (localStorage.getItem('appuntiTheme') === 'light') {
            document.body.classList.add('light-theme');
        }
    });

    // --- UTILITY E NAVBAR ---
    function getCookieSafe(name) {
        let value = `; ${document.cookie}`;
        let parts = value.split(`; ${name}=`);
        if (parts.length === 2) return parts.pop().split(';').shift();
        return null;
    }

    function aggiornaNavbar() {
        const btnLogin = document.getElementById('navLoginBtn');
        if (getCookieSafe('username') && btnLogin) {
            btnLogin.style.display = 'none';
        }
    }

    const coloriMateria = {
        "Matematica":"#f97316","Scienze":"#22c55e","Fisica":"#3b82f6","Chimica":"#a855f7",
        "Storia":"#ec4899","Geografia":"#14b8a6","Italiano":"#f59e0b","Inglese":"#6366f1",
        "Informatica":"#ef4444","Arte":"#0ea5e9","Biologia":"#059669","Geometria":"#7c3aed"
    };
    const iconeMateria = {
        "Matematica":"∑","Scienze":"🔬","Fisica":"⚛️","Chimica":"🧪","Storia":"📖",
        "Geografia":"🌍","Italiano":"✏️","Inglese":"🗣️","Informatica":"💻","Arte":"🎨",
        "Biologia":"🧬","Geometria":"📐"
    };

    const usernameUrl = new URLSearchParams(window.location.search).get('user') || '';

    // --- GESTIONE CRONOLOGIA ---
    function getCronologia() {
        return JSON.parse(localStorage.getItem('searchHistory') || '[]');
    }

    function aggiungiACronologia(userObj) {
        let history = getCronologia();
        history = history.filter(u => u.username !== userObj.username);
        history.unshift(userObj);
        if (history.length > 5) history.pop();
        localStorage.setItem('searchHistory', JSON.stringify(history));
    }

    function pulisciCronologia() {
        localStorage.removeItem('searchHistory');
        gestisciInput(document.getElementById('userInput'));
    }

    function generaHtmlUtente(u, isHistory = false) {
        const onclickAttr = `onclick="aggiungiACronologia({username: '${u.username}', foto_profilo_url: '${u.foto_profilo_url || ''}'})"`;
        return `
            <a class="${isHistory ? 'history-result' : 'user-result'}" href="utenti.html?user=${u.username}" ${onclickAttr}>
                ${isHistory ? '<div class="history-icon">🕒</div>' : `
                <div class="user-result__photo">
                    ${u.foto_profilo_url ? `<img src="${u.foto_profilo_url}">` : (u.username || '?').charAt(0).toUpperCase()}
                </div>
                `}
                <div>
                    <div class="user-result__name">@${u.username}</div>
                </div>
            </a>`;
    }

    // --- MODALITÀ: RICERCA ---
    function mostraRicerca() {
        document.title = 'Cerca Utenti — Appunti';
        document.getElementById('navBack').style.display = 'none';
        document.getElementById('pageContent').innerHTML = `
            <div class="search-page">
                <h1 class="search-page__title">Cerca utenti</h1>
                <p class="search-page__sub">Trova altri studenti e scopri i loro contenuti pubblicati</p>
                <div class="search-box">
                    <input class="search-box__input" id="userInput" type="text" placeholder="Cerca @username..." oninput="gestisciInput(this)" onclick="gestisciInput(this)" autocomplete="off">
                    <button class="search-box__btn" onclick="eseguiRicerca(document.getElementById('userInput').value)">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    </button>
                </div>
                <div class="results-container" id="risultati">
                    <div class="empty">Inizia a scrivere per cercare qualcuno...</div>
                </div>
            </div>`;
        
        if(localStorage.getItem('appuntiTheme') !== 'light'){
            document.querySelector('.search-box__btn svg').setAttribute('stroke', '#000');
        }

        const inputVal = document.getElementById('userInput').value;
        if(inputVal.length > 0) eseguiRicerca(inputVal);
        else mostraSuggerimenti();
    }

    let timer;
    function gestisciInput(inputEl) {
        const val = inputEl.value.trim();
        clearTimeout(timer);
        if (val.length === 0) {
            mostraSuggerimenti();
            return;
        }
        timer = setTimeout(() => eseguiRicerca(val), 300);
    }

    function mostraSuggerimenti() {
        const box = document.getElementById('risultati');
        const history = getCronologia();

        if (history.length > 0) {
            box.innerHTML = `
                <div class="results-header">
                    <h3 class="results-label">Ricerche Recenti</h3>
                    <button class="clear-history-btn" onclick="pulisciCronologia()">Cancella</button>
                </div>
                ${history.map(u => generaHtmlUtente(u, true)).join('')}
            `;
        } else {
            box.innerHTML = `<div class="empty">Inizia a scrivere per cercare qualcuno...</div>`;
        }
    }

    async function eseguiRicerca(q) {
        const box = document.getElementById('risultati');
        if (!q.trim()) { mostraSuggerimenti(); return; }

        box.innerHTML = `<div class="loading"><div class="spinner"></div></div>`;
        try {
            const res = await fetch(`/api/cerca-utenti?q=${encodeURIComponent(q)}`);
            const utenti = await res.json();
            
            if (utenti.length === 0) {
                box.innerHTML = `<div class="empty">Nessun utente trovato per "${q}"</div>`;
                return;
            }
            box.innerHTML = `<div class="results-header"><h3 class="results-label">Risultati della ricerca</h3></div>` 
                            + utenti.map(u => generaHtmlUtente(u, false)).join('');
        } catch (e) { box.innerHTML = `<div class="empty">Errore di connessione al server.</div>`; }
    }

    // --- SWITCH TABS ---
    function showTab(tabName) {
        document.getElementById('section-appunti').classList.remove('active');
        document.getElementById('section-podcast').classList.remove('active');
        document.getElementById('section-playlists').classList.remove('active');
        
        document.getElementById('btn-tab-appunti').classList.remove('active');
        document.getElementById('btn-tab-podcast').classList.remove('active', 'active-podcast');
        document.getElementById('btn-tab-playlists').classList.remove('active');
        
        if (tabName === 'appunti') {
            document.getElementById('section-appunti').classList.add('active');
            document.getElementById('btn-tab-appunti').classList.add('active');
        } else if (tabName === 'podcast') {
            document.getElementById('section-podcast').classList.add('active');
            document.getElementById('btn-tab-podcast').classList.add('active-podcast');
        } else if (tabName === 'playlists') {
            document.getElementById('section-playlists').classList.add('active');
            document.getElementById('btn-tab-playlists').classList.add('active');
        }
    }

    // --- GESTIONE FOLLOW (NUOVA FUNZIONALITÀ AGGIORNATA) ---
    window.toggleFollow = async function(targetId) {
        const myId = getCookieSafe('utente_id');
        if (!myId) {
            alert("Devi effettuare l'accesso per poter seguire gli utenti!");
            window.location.href = "login.html";
            return;
        }
        
        const btn = document.getElementById('btnFollow');
        btn.disabled = true;
        
        try {
            const res = await fetch('/api/follow', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ follower_id: myId, seguito_id: targetId })
            });
            const data = await res.json();
            
            const statFollowers = document.getElementById('statFollowers');
            let count = parseInt(statFollowers.innerText) || 0;

            if (data.action === 'followed') {
                btn.classList.add('following');
                btn.innerHTML = 'Smetti di seguire'; 
                statFollowers.innerText = count + 1;
            } else if (data.action === 'unfollowed') {
                btn.classList.remove('following');
                btn.innerHTML = 'Segui'; 
                statFollowers.innerText = Math.max(0, count - 1);
            }
        } catch (e) {
            console.error(e);
            alert("Errore di connessione");
        }
        btn.disabled = false;
    }

    async function initFollowData(targetId) {
        const myId = getCookieSafe('utente_id');
        const btn = document.getElementById('btnFollow');

        try {
            const resStats = await fetch(`/api/follow?utente_id=${targetId}`);
            if (resStats.ok) {
                const stats = await resStats.json();
                document.getElementById('statFollowers').innerText = stats.followers || 0;
                document.getElementById('statFollowing').innerText = stats.following || 0;
            }
        } catch(e) { console.error(e) }

        if (myId !== targetId) {
            btn.style.display = 'block';
            
            if (myId) {
                try {
                    const resCheck = await fetch(`/api/follow?utente_id=${myId}&target_id=${targetId}&check_status=true`);
                    if (resCheck.ok) {
                        const check = await resCheck.json();
                        if (check.isFollowing) {
                            btn.classList.add('following');
                            btn.innerHTML = 'Smetti di seguire'; 
                        }
                    }
                } catch(e) {}
            }
        }
    }

    // --- MODALITÀ: PROFILO ---
    async function caricaProfilo() {
        document.getElementById('navBack').style.display = 'flex';
        try {
            const [resU, resA, resP] = await Promise.all([
                fetch(`/api/utente?username=${encodeURIComponent(usernameUrl)}`),
                fetch(`/api/appunti?username=${encodeURIComponent(usernameUrl)}`),
                fetch(`/api/podcast?username=${encodeURIComponent(usernameUrl)}`) 
            ]);
            
            if (!resU.ok) { mostraNotFound(); return; }
            
            const u = await resU.json();
            document.title = `@${u.username} — Appunti`;

            const allAppunti = resA.ok ? await resA.json() : [];
            const allPodcast = resP.ok ? await resP.json() : []; 

            const appuntiFiltrati = allAppunti.filter(a => a.username === u.username);
            const podcastFiltrati = allPodcast.filter(p => p.username === u.username);

            renderProfiloHtml(u, appuntiFiltrati, podcastFiltrati);
            
            caricaPlaylistsUtente(u.id);
            initFollowData(u.id);

        } catch (e) { mostraNotFound(); }
    }

    function renderProfiloHtml(u, appunti, podcast) {
        const data = new Date(u.created_at).toLocaleDateString('it-IT', { day:'numeric', month:'long', year:'numeric' });
        
        document.getElementById('pageContent').innerHTML = `
            <div class="cover">
                <div class="cover__pattern"></div>
                <div class="cover__grad"></div>
            </div>
            <div class="profile-header">
                <div class="profile-avatar">
                    ${u.foto_profilo_url ? `<img src="${u.foto_profilo_url}">` : (u.username || '?').charAt(0).toUpperCase()}
                </div>
                <div class="profile-info">
                    <h1 class="profile-name">@${u.username}</h1>
                    <div class="profile-username-sub">Iscritto il ${data}</div>
                </div>
                <div class="profile-actions">
                    <button class="btn-share btn-follow" id="btnFollow" onclick="toggleFollow('${u.id}')" style="display:none;">Segui</button>
                    <button class="btn-share" onclick="condividi('${u.username.replace(/'/g, "\\'")}')">↗ Condividi</button>
                </div>
            </div>
            <div class="main">
                <div class="stats-row">
                    <div class="stat-card">
                        <span class="stat-card__n">${appunti.length + podcast.length}</span>
                        <span class="stat-card__l">Contenuti</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-card__n" id="statFollowers">0</span>
                        <span class="stat-card__l">Followers</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-card__n" id="statFollowing">0</span>
                        <span class="stat-card__l">Seguiti</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-card__n" style="font-size: 1.25rem; word-break: break-word;">${u.scuola || 'Nessuna'}</span>
                        <span class="stat-card__l">Scuola</span>
                    </div>
                </div>
                
                <div class="tabs-container">
                    <button class="tab-btn active" id="btn-tab-appunti" onclick="showTab('appunti')">📄 Appunti (${appunti.length})</button>
                    <button class="tab-btn" id="btn-tab-podcast" onclick="showTab('podcast')">🎙️ Podcast (${podcast.length})</button>
                    <button class="tab-btn" id="btn-tab-playlists" onclick="showTab('playlists')">📂 Playlists</button>
                </div>

                <div id="section-appunti" class="content-section active">
                    <div class="notes-grid">
                        ${appunti.map(a => {
                            const c = coloriMateria[a.materia] || '#888';
                            const icon = iconeMateria[a.materia] || '📄';
                            return `
                            <a href="esplora.html?focus=${a.id}" class="note-card">
                                <div class="note-card__thumb">
                                    <div class="note-card__thumb-bg" style="background:${a.cover_url ? `url('${a.cover_url}') center/cover` : `radial-gradient(circle, ${c}, transparent)`}; opacity: ${a.cover_url ? 0.4 : 0.15}"></div>
                                    <div class="note-card__thumb-icon">${icon}</div>
                                </div>
                                <div class="note-card__body">
                                    <div class="note-card__chip" style="background:${c}20; color:${c}; border:1px solid ${c}40">${a.materia}</div>
                                    <div class="note-card__title">${a.titolo}</div>
                                    <div class="note-card__meta">Visualizza appunto</div>
                                </div>
                            </a>`;
                        }).join('')}
                    </div>
                    ${appunti.length === 0 ? '<div class="empty">L\'utente non ha ancora caricato appunti.</div>' : ''}
                </div>

                <div id="section-podcast" class="content-section">
                    <div class="notes-grid">
                        ${podcast.map(p => `
                            <a href="podcast.html?focus=${p.id}" class="note-card podcast-card">
                                <div class="note-card__thumb" style="background: var(--surface2);">
                                    <div class="note-card__thumb-bg" style="background: radial-gradient(circle, var(--accent2), transparent); opacity: 0.15"></div>
                                    <div class="note-card__thumb-icon">🎙️</div>
                                </div>
                                <div class="note-card__body">
                                    <div class="note-card__chip" style="background:rgba(255,77,109,0.15); color:var(--accent2); border:1px solid rgba(255,77,109,0.3)">Podcast</div>
                                    <div class="note-card__title">${p.titolo}</div>
                                    <div class="note-card__meta">Ascolta ora</div>
                                </div>
                            </a>
                        `).join('')}
                    </div>
                    ${podcast.length === 0 ? '<div class="empty">L\'utente non ha ancora caricato podcast.</div>' : ''}
                </div>

                <div id="section-playlists" class="content-section">
                    <div id="vistaElencoPlaylists">
                        <div id="grigliaPlaylists" class="notes-grid">
                            <p style="color:var(--muted); font-size:0.9rem;">Caricamento playlists…</p>
                        </div>
                    </div>
                    
                    <div id="vistaContenutoPlaylist" style="display:none;">
                        <div class="playlist-back-row">
                            <button class="playlist-back-btn" onclick="tornaAllePlaylists()">← Indietro</button>
                            <h2 class="playlist-back-title" id="titoloPlaylistAttuale"></h2>
                        </div>
                        <div id="grigliaContenutoPlaylist" class="notes-grid"></div>
                    </div>
                </div>
            </div>`;
    }

    // --- CARICAMENTO E GESTIONE PLAYLIST DELL'UTENTE VISUALIZZATO ---
    async function caricaPlaylistsUtente(idProprietario) {
        const container = document.getElementById('grigliaPlaylists');
        try {
            const res = await fetch(`/api/playlists?utente_id=${idProprietario}`);
            if(!res.ok) throw new Error();
            const playlists = await res.json();
            
            if (playlists.length === 0) {
                container.innerHTML = "<div class='empty' style='grid-column: 1/-1;'>Nessuna playlist creata da questo utente.</div>";
                return;
            }

            container.innerHTML = playlists.map(pl => `
                <div class="playlist-card">
                    <div class="playlist-card__cover">📂</div>
                    <div class="playlist-card__body">
                        <div class="playlist-card__title">${pl.titolo}</div>
                        <div class="playlist-card__count">${pl.numero_appunti || 0} elementi</div>
                        <button class="playlist-card__btn"
                            onclick="apriContenutoPlaylist(${pl.id}, '${pl.titolo.replace(/'/g, "\\'")}')">
                            Esplora →
                        </button>
                    </div>
                </div>`).join('');
        } catch { 
            container.innerHTML = "<div class='empty' style='grid-column: 1/-1;'>Errore nel caricamento delle playlist.</div>"; 
        }
    }

    window.apriContenutoPlaylist = async function(playlistId, titoloPlaylist) {
        document.getElementById('vistaElencoPlaylists').style.display = 'none';
        document.getElementById('vistaContenutoPlaylist').style.display = 'block';
        document.getElementById('titoloPlaylistAttuale').textContent = titoloPlaylist;
        const container = document.getElementById('grigliaContenutoPlaylist');
        container.innerHTML = "<p style='color:var(--muted); font-size:0.9rem;'>Caricamento…</p>";
        
        try {
            const res = await fetch(`/api/playlists?playlist_id=${playlistId}`);
            if (!res.ok) throw new Error();
            const appunti = await res.json();
            if (appunti.length === 0) {
                container.innerHTML = "<div class='empty' style='grid-column: 1/-1;'>Questa raccolta è vuota.</div>";
                return;
            }
            container.innerHTML = appunti.map(a => {
                const isPodcast = a.tipo === 'podcast';
                const icona = isPodcast ? '🎙️' : '📄';
                const link = isPodcast ? `podcast.html?focus=${a.id}` : `esplora.html?focus=${a.id}`;
                const label = isPodcast ? 'Ascolta' : 'Apri Appunto';
                return `
                <div class="note-card">
                    <div class="note-thumb">${a.cover_url ? `<img src="${a.cover_url}">` : `<div class="note-thumb-bg"></div><span style="font-size:2.5rem; position:relative; z-index:1;">${icona}</span>`}</div>
                    <div class="note-info">
                        <div class="note-title">${a.titolo}</div>
                        <div class="note-meta">${a.materia || a.categoria || 'Contenuto'} · @${a.username || 'Anonimo'}</div>
                        <div style="margin-top:auto; padding-top:10px;">
                            <a href="${link}" class="btn-small btn-open" style="display:block;">${label}</a>
                        </div>
                    </div>
                </div>`
            }).join('');
        } catch { container.innerHTML = "<div class='empty' style='grid-column: 1/-1;'>Errore di connessione.</div>"; }
    }

    window.tornaAllePlaylists = function() {
        document.getElementById('vistaContenutoPlaylist').style.display = 'none';
        document.getElementById('vistaElencoPlaylists').style.display = 'block';
    }

    function mostraNotFound() {
        document.getElementById('pageContent').innerHTML = `
            <div class="empty" style="margin-top:100px">
                <h1 style="font-family:Fraunces; font-size:3rem">404</h1>
                <p>Utente non trovato.</p>
                <a href="utenti.html" style="color:var(--accent); font-weight:800; text-decoration:none">Torna alla ricerca</a>
            </div>`;
    }

    function condividi(username) {
        const url = window.location.href;
        if (navigator.share) {
            navigator.share({ title: `Profilo di @${username} su Appunti`, url });
        } else {
            navigator.clipboard.writeText(url).then(() => {
                const t = document.getElementById('toast');
                t.textContent = "Link copiato negli appunti!";
                t.classList.add('show');
                setTimeout(() => t.classList.remove('show'), 3000);
            });
        }
    }

    document.addEventListener("DOMContentLoaded", () => {
        aggiornaNavbar();
        if (usernameUrl) caricaProfilo();
        else mostraRicerca();
    });
</script>

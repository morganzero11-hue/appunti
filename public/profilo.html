<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profilo — Appunti</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="topnav">
        <div class="topnav__brand">📚 Appunti</div>
        <ul class="topnav__links">
            <li><a href="index.html" id="nav-home">Home</a></li>
            <li><a href="esplora.html" id="nav-esplora">Esplora</a></li>
            <li><a href="profilo.html" id="nav-profilo">Profilo</a></li>
            <li><a href="utenti.html" id="nav-utenti">Utenti</a></li>
        </ul>
        <div class="topnav__search">
            <input type="text" id="searchInput" placeholder="Cerca...">
            <button onclick="cerca()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></button>
        </div>
        <a href="login.html" class="nav__login" id="authBtn">Accedi</a>
    </nav>

    <div class="profile-wrapper">
        <div class="profile-card">
            <span class="section-label">Il tuo Profilo</span>
            <div class="avatar-upload">
                <div class="avatar-preview" onclick="document.getElementById('fileIn').click()">
                    <img id="avatarImg" style="display:none;">
                    <span id="avatarPh">📸</span>
                </div>
                <input type="file" id="fileIn" hidden onchange="uploadAvatar(event)" accept="image/*">
            </div>

            <div class="info-group">
                <span class="info-label">NOME</span>
                <div class="info-value" id="valNome">Caricamento...</div>
            </div>
            </div>
    </div>

    <script src="main.js"></script>
    <script src="js/profilo.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profilo | Appunti</title>
    <link rel="stylesheet" href="style.css"> </head>
<body>

<nav class="nav">
    <a href="index.html">📚 Appunti</a>
    <div class="nav-right">
        <a href="esplora.html">Esplora</a>
        <a href="profilo.html" class="active">Profilo</a>
        <a href="login.html" id="btnAuth">Login</a>
    </div>
</nav>

<div class="profile-container">
    <div class="avatar-section">
        <div class="avatar-circle" onclick="document.getElementById('fileIn').click()">
            <img id="avatarImg" style="display:none;">
            <span id="avatarPh">Aggiungi foto</span>
        </div>
        <input type="file" id="fileIn" hidden>
    </div>

    <div class="form-group">
        <label>Nome</label>
        <input type="text" id="nomeIn" placeholder="Il tuo nome">
    </div>
    <div class="form-group">
        <label>Cognome</label>
        <input type="text" id="cognomeIn" placeholder="Il tuo cognome">
    </div>
    <div class="form-group">
        <label>Email</label>
        <input type="email" id="emailIn" placeholder="La tua email">
    </div>

    <button class="btn-primary" onclick="salvaProfilo()">Salva modifiche</button>
</div>

<script src="js/auth.js"></script>
<script src="js/profilo.js"></script>
</body>
</html>

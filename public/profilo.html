<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profilo — Appunti</title>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,700;0,900;1,400&family=Cabinet+Grotesk:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --cream:   #f5f0e8;
            --paper:   #faf7f2;
            --ink:     #1c1917;
            --ink2:    #44403c;
            --muted:   #a8a29e;
            --border:  #e5ddd0;
            --accent:  #d4522a;
            --accent2: #2a7d4f;
            --yellow:  #f0c040;
            --nav-h:   60px;
            --r:       18px;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Cabinet Grotesk', sans-serif;
            background: var(--cream);
            color: var(--ink);
            min-height: 100vh;
        }

        /* ─── NAVBAR ─── */
        .nav {
            position: fixed; top: 0; left: 0; right: 0;
            height: var(--nav-h);
            background: var(--ink);
            display: flex; align-items: center;
            padding: 0 36px; gap: 32px;
            z-index: 100;
        }
        .nav__brand {
            font-family: 'Fraunces', serif;
            font-size: 1.3rem; font-weight: 900;
            color: var(--yellow);
            text-decoration: none; white-space: nowrap;
            letter-spacing: -0.5px;
        }
        .nav__links { list-style: none; display: flex; gap: 2px; flex: 1; }
        .nav__links a {
            padding: 6px 13px; border-radius: 8px;
            color: rgba(255,255,255,0.55);
            text-decoration: none; font-size: 0.87rem; font-weight: 700;
            transition: all .18s;
        }
        .nav__links a:hover { color: #fff; background: rgba(255,255,255,0.07); }
        .nav__links a.active { color: var(--yellow); }
        .nav__login {
            background: var(--accent); color: #fff;
            padding: 7px 18px; border-radius: 8px;
            font-size: 0.87rem; font-weight: 800;
            text-decoration: none; white-space: nowrap;
            transition: transform .2s, box-shadow .2s;
        }
        .nav__login:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(212,82,42,0.3); }

        /* ─── HERO BAND ─── */
        .hero-band {
            margin-top: var(--nav-h);
            height: 220px;
            background: var(--ink);
            position: relative; overflow: hidden;
        }
        .hero-band::before {
            content: '';
            position: absolute; inset: 0;
            background-image:
                repeating-linear-gradient(45deg, rgba(255,255,255,0.03) 0px, rgba(255,255,255,0.03) 1px, transparent 1px, transparent 12px),
                repeating-linear-gradient(-45deg, rgba(255,255,255,0.03) 0px, rgba(255,255,255,0.03) 1px, transparent 1px, transparent 12px);
        }
        .hero-band__accent {
            position: absolute; width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(212,82,42,0.2) 0%, transparent 65%);
            bottom: -200px; left: -60px; pointer-events: none;
        }
        .hero-band__accent2 {
            position: absolute; width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(240,192,64,0.12) 0%, transparent 65%);
            top: -150px; right: 5%; pointer-events: none;
        }
        .hero-band__label {
            position: absolute; top: 28px; left: 40px;
            font-family: 'Fraunces', serif;
            font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 900;
            color: rgba(255,255,255,0.08); letter-spacing: -2px; user-select: none;
        }

        /* ─── LAYOUT ─── */
        .layout {
            max-width: 1060px; margin: 0 auto;
            padding: 0 28px 80px;
            display: grid; grid-template-columns: 280px 1fr;
            gap: 0 28px;
        }

        /* ─── LEFT ─── */
        .left-col {
            grid-column: 1; margin-top: -70px;
            display: flex; flex-direction: column; gap: 14px;
        }

        .avatar-card {
            background: var(--paper); border: 1px solid var(--border);
            border-radius: var(--r); padding: 28px 24px;
            display: flex; flex-direction: column; align-items: center; gap: 18px;
            box-shadow: 0 4px 24px rgba(28,25,23,0.08);
            animation: riseUp .5s ease both;
        }
        .avatar-ring { position: relative; width: 120px; height: 120px; }
        .avatar-circle {
            width: 120px; height: 120px; border-radius: 50%;
            background: var(--cream); border: 3px solid var(--border);
            overflow: hidden; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: border-color .2s, box-shadow .2s;
        }
        .avatar-circle:hover { border-color: var(--accent); box-shadow: 0 0 0 5px rgba(212,82,42,0.12); }
        .avatar-circle img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .avatar-placeholder {
            display: flex; flex-direction: column; align-items: center; gap: 5px;
            color: var(--muted); font-size: 0.68rem; font-weight: 800;
            text-transform: uppercase; letter-spacing: 1px; text-align: center;
            transition: color .2s;
        }
        .avatar-circle:hover .avatar-placeholder { color: var(--accent); }
        .avatar-edit-btn {
            position: absolute; bottom: 2px; right: 2px;
            width: 28px; height: 28px; background: var(--accent); border-radius: 50%;
            border: 2px solid var(--paper);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: transform .2s, background .2s;
        }
        .avatar-edit-btn:hover { transform: scale(1.15); background: #b8421e; }
        #avatarInput { display: none; }

        .field-wrap { width: 100%; display: flex; flex-direction: column; gap: 5px; }
        .field-label { font-size: 0.68rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1.2px; color: var(--muted); }
        .field-input, .field-textarea {
            background: var(--cream); border: 1.5px solid var(--border);
            border-radius: 10px; color: var(--ink);
            font-family: 'Cabinet Grotesk', sans-serif;
            font-size: 0.95rem; font-weight: 700;
            padding: 10px 14px; width: 100%; outline: none; resize: none;
            transition: border-color .2s, box-shadow .2s, background .2s;
        }
        .field-input::placeholder, .field-textarea::placeholder { color: var(--muted); font-weight: 500; }
        .field-input:focus, .field-textarea:focus {
            border-color: var(--accent); background: #fff;
            box-shadow: 0 0 0 3px rgba(212,82,42,0.1);
        }
        .field-textarea { min-height: 80px; line-height: 1.55; }
        .char-counter { font-size: 0.67rem; color: var(--muted); text-align: right; }

        .btn-save {
            width: 100%; background: var(--accent); color: #fff; border: none;
            border-radius: 10px; padding: 11px;
            font-family: 'Fraunces', serif; font-size: 1rem; font-weight: 700;
            cursor: pointer; transition: transform .2s, box-shadow .2s, background .2s;
        }
        .btn-save:hover { background: #b8421e; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(212,82,42,0.28); }

        /* Stats */
        .stats-card {
            background: var(--ink); border-radius: var(--r); padding: 22px;
            display: grid; grid-template-columns: 1fr 1fr; gap: 1px;
            overflow: hidden; animation: riseUp .5s .08s ease both; opacity: 0;
        }
        .stat { display: flex; flex-direction: column; align-items: center; padding: 12px 8px; gap: 3px; }
        .stat__n { font-family: 'Fraunces', serif; font-size: 1.65rem; font-weight: 900; color: var(--yellow); line-height: 1; }
        .stat__l { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.8px; color: rgba(255,255,255,0.4); }

        /* ─── RIGHT ─── */
        .right-col { grid-column: 2; margin-top: 28px; animation: riseUp .5s .12s ease both; opacity: 0; }

        .tabs-bar { display: flex; gap: 6px; margin-bottom: 22px; }
        .tab-pill {
            background: none; border: 1.5px solid var(--border);
            border-radius: 30px; padding: 8px 20px;
            font-family: 'Cabinet Grotesk', sans-serif;
            font-size: 0.85rem; font-weight: 800; color: var(--ink2); cursor: pointer;
            transition: all .2s; display: flex; align-items: center; gap: 7px;
        }
        .tab-pill:hover { border-color: var(--ink2); color: var(--ink); }
        .tab-pill.active { background: var(--ink); color: #fff; border-color: var(--ink); }
        .tab-pill .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; opacity: 0.5; }
        .tab-pill.active .dot { background: var(--yellow); opacity: 1; }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* Griglia appunti */
        .tiktok-grid { columns: 3; column-gap: 12px; }
        .tt-card {
            break-inside: avoid; margin-bottom: 12px;
            border-radius: 14px; overflow: hidden; cursor: pointer;
            border: 1.5px solid var(--border); background: var(--paper);
            transition: transform .25s, box-shadow .25s, border-color .25s;
        }
        .tt-card:hover { transform: translateY(-5px) scale(1.02); box-shadow: 0 14px 40px rgba(28,25,23,0.12); border-color: var(--c,#ccc); }
        .tt-card__thumb {
            aspect-ratio: 3/4; background: var(--cream);
            display: flex; align-items: center; justify-content: center;
            position: relative; overflow: hidden;
        }
        .tt-card__bg { position: absolute; inset: 0; opacity: 0.15; }
        .tt-card__emoji { font-size: 2.6rem; position: relative; z-index: 1; filter: drop-shadow(0 3px 10px rgba(0,0,0,0.2)); }
        .tt-card__body { padding: 10px 11px 12px; }
        .tt-card__chip {
            display: inline-block; font-size: 0.62rem; font-weight: 800;
            text-transform: uppercase; letter-spacing: 0.8px;
            padding: 2px 8px; border-radius: 20px; margin-bottom: 5px;
            background: color-mix(in srgb, var(--c) 14%, transparent);
            color: var(--c); border: 1px solid color-mix(in srgb, var(--c) 25%, transparent);
        }
        .tt-card__title { font-family: 'Fraunces', serif; font-size: 0.8rem; font-weight: 700; line-height: 1.3; color: var(--ink); }
        .tt-card__meta { font-size: 0.66rem; color: var(--muted); margin-top: 4px; }

        /* Empty */
        .empty { padding: 56px 20px; text-align: center; color: var(--muted); }
        .empty__icon { font-size: 2.8rem; margin-bottom: 12px; opacity: 0.45; }
        .empty p { font-size: 0.88rem; line-height: 1.6; }

        /* Upload bar */
        .upload-bar {
            width: 100%; display: flex; align-items: center; justify-content: center; gap: 12px;
            padding: 32px 24px; margin-bottom: 18px;
            border-radius: 14px; border: 2px dashed var(--border);
            background: transparent; cursor: pointer; color: var(--muted);
            transition: border-color .2s, background .2s, color .2s, transform .2s;
        }
        .upload-bar:hover { border-color: var(--accent); background: rgba(212,82,42,0.04); color: var(--accent); transform: translateY(-2px); }
        .upload-bar__plus {
            width: 32px; height: 32px; border: 2px solid currentColor; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem; font-weight: 300; line-height: 1;
            transition: transform .25s; flex-shrink: 0;
        }
        .upload-bar:hover .upload-bar__plus { transform: rotate(90deg); }
        .upload-bar__label { font-size: 0.85rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1.2px; }

        /* Modal */
        .modal-backdrop {
            position: fixed; inset: 0; background: rgba(28,25,23,0.55);
            backdrop-filter: blur(6px); z-index: 200;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity .25s;
        }
        .modal-backdrop.open { opacity: 1; pointer-events: all; }
        .modal {
            background: var(--paper); border: 1px solid var(--border);
            border-radius: 22px; padding: 36px 32px; width: min(520px, 92vw);
            box-shadow: 0 24px 64px rgba(28,25,23,0.18);
            transform: translateY(20px) scale(0.97); transition: transform .3s;
            display: flex; flex-direction: column; gap: 18px;
        }
        .modal-backdrop.open .modal { transform: translateY(0) scale(1); }
        .modal__header { display: flex; align-items: center; justify-content: space-between; }
        .modal__title { font-family: 'Fraunces', serif; font-size: 1.4rem; font-weight: 900; color: var(--ink); }
        .modal__close {
            width: 32px; height: 32px; border-radius: 8px;
            background: var(--cream); border: 1px solid var(--border);
            cursor: pointer; font-size: 1rem; color: var(--ink2);
            display: flex; align-items: center; justify-content: center; transition: background .2s;
        }
        .modal__close:hover { background: var(--border); }
        .modal .field-wrap { gap: 6px; }

        .field-select {
            background: var(--cream); border: 1.5px solid var(--border);
            border-radius: 10px; color: var(--ink);
            font-family: 'Cabinet Grotesk', sans-serif;
            font-size: 0.95rem; font-weight: 700; padding: 10px 14px;
            width: 100%; outline: none; cursor: pointer; transition: border-color .2s;
            appearance: none;
            background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%23a8a29e' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");
            background-repeat: no-repeat; background-position: right 14px center;
        }
        .field-select:focus { border-color: var(--accent); }

        .drop-zone {
            border: 2px dashed var(--border); border-radius: 12px;
            padding: 28px 20px; text-align: center; cursor: pointer;
            transition: border-color .2s, background .2s; color: var(--muted);
        }
        .drop-zone:hover, .drop-zone.drag-over { border-color: var(--accent); background: rgba(212,82,42,0.04); color: var(--accent); }
        .drop-zone__icon { font-size: 2rem; margin-bottom: 8px; }
        .drop-zone__text { font-size: 0.82rem; font-weight: 700; line-height: 1.5; }
        .drop-zone__sub { font-size: 0.72rem; color: var(--muted); margin-top: 4px; }
        .drop-zone.has-file { border-color: var(--accent2); background: rgba(42,125,79,0.05); color: var(--accent2); }

        /* Toast */
        .toast {
            position: fixed; bottom: 24px; right: 24px;
            background: var(--ink); color: var(--yellow);
            padding: 11px 22px; border-radius: 12px;
            font-family: 'Fraunces', serif; font-weight: 700; font-size: 0.9rem;
            opacity: 0; transform: translateY(12px);
            transition: all .3s; pointer-events: none; z-index: 9999;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .toast.show { opacity: 1; transform: translateY(0); }

        /* Spinner */
        .spinner {
            width: 32px; height: 32px;
            border: 3px solid var(--border); border-top-color: var(--accent);
            border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @keyframes riseUp { from { opacity: 0; transform: translateY(22px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 700px) {
            .layout { grid-template-columns: 1fr; }
            .left-col { margin-top: -50px; grid-column: 1; }
            .right-col { grid-column: 1; margin-top: 0; }
            .tiktok-grid { columns: 2; }
            .nav__links { display: none; }
            .hero-band { height: 160px; }
        }
    </style>
</head>
<body>

<nav class="nav">
    <a href="index.html" class="nav__brand">📚 Appunti</a>
    <ul class="nav__links">
        <li><a href="index.html">Home</a></li>
        <li><a href="esplora.html">Esplora</a></li>
        <li><a href="profilo.html" class="active">Profilo</a></li>
        <li><a href="utenti.html">Utenti</a></li>
        <li><a href="impostazioni.html">Impostazioni</a></li>
        <a href="login.html" class="nav__login">Accedi</a>
    </ul>
</nav>

<div class="hero-band">
    <div class="hero-band__accent"></div>
    <div class="hero-band__accent2"></div>
    <div class="hero-band__label">PROFILO</div>
</div>

<div class="layout">

    <!-- LEFT -->
    <aside class="left-col">
        <div class="avatar-card">
            <div class="avatar-ring">
                <div class="avatar-circle" onclick="document.getElementById('avatarInput').click()">
                    <img id="avatarImg" alt="Avatar">
                    <div class="avatar-placeholder" id="avatarPh">
                        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        Aggiungi foto
                    </div>
                </div>
                <div class="avatar-edit-btn" onclick="document.getElementById('avatarInput').click()">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5">
                        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                    </svg>
                </div>
                <input type="file" id="avatarInput" accept="image/*" onchange="uploadAvatar(event)">
            </div>

            <div class="field-wrap">
                <div class="field-label">Nickname</div>
                <input class="field-input" id="nickIn" type="text" maxlength="30"
                    placeholder="es. studente_curioso99"
                    oninput="cnt('nickIn','nickCnt',30)">
                <div class="char-counter"><span id="nickCnt">0</span>/30</div>
            </div>

            <div class="field-wrap">
                <div class="field-label">Bio</div>
                <textarea class="field-textarea" id="bioIn" maxlength="160"
                    placeholder="Materie preferite, obiettivi…"
                    oninput="cnt('bioIn','bioCnt',160)"></textarea>
                <div class="char-counter"><span id="bioCnt">0</span>/160</div>
            </div>

            <button class="btn-save" onclick="salvaProfilo()">Salva profilo</button>
        </div>

        <!-- Stats dal DB -->
        <div class="stats-card">
            <div class="stat">
                <div class="stat__n" id="statPub">—</div>
                <div class="stat__l">Pubblicati</div>
            </div>
            <div class="stat">
                <div class="stat__n" id="statSav">—</div>
                <div class="stat__l">Salvati</div>
            </div>
        </div>
    </aside>

    <!-- RIGHT -->
    <div class="right-col">
        <div class="tabs-bar">
            <button class="tab-pill active" onclick="switchTab('pub', this)">
                <span class="dot"></span> I tuoi appunti
            </button>
            <button class="tab-pill" onclick="switchTab('sav', this)">
                <span class="dot"></span> Appunti salvati
            </button>
        </div>

        <!-- Tab: pubblicati -->
        <div class="tab-panel active" id="tab-pub">
            <div class="upload-bar" onclick="apriModale()">
                <span class="upload-bar__plus">+</span>
                <span class="upload-bar__label">Carica appunto</span>
            </div>
            <div id="gridPub"><div class="spinner"></div></div>
        </div>

        <!-- Tab: salvati -->
        <div class="tab-panel" id="tab-sav">
            <div id="gridSav"><div class="spinner"></div></div>
        </div>
    </div>
</div>

<!-- MODAL UPLOAD -->
<div class="modal-backdrop" id="modalBackdrop" onclick="chiudiModale(event)">
    <div class="modal">
        <div class="modal__header">
            <div class="modal__title">Carica appunto</div>
            <button class="modal__close" onclick="chiudiModale()">✕</button>
        </div>

        <div class="field-wrap">
            <div class="field-label">Titolo</div>
            <input class="field-input" id="upTitolo" type="text" maxlength="60" placeholder="Es. Derivate — Regole base">
        </div>

        <div class="field-wrap">
            <div class="field-label">Materia</div>
            <select class="field-select" id="upMateria">
                <option value="">— Seleziona materia —</option>
                <option value="Matematica">∑ Matematica</option>
                <option value="Scienze">🔬 Scienze</option>
                <option value="Fisica">⚛️ Fisica</option>
                <option value="Chimica">🧪 Chimica</option>
                <option value="Storia">📖 Storia</option>
                <option value="Geografia">🌍 Geografia</option>
                <option value="Italiano">✏️ Italiano</option>
                <option value="Inglese">🗣️ Inglese</option>
                <option value="Informatica">💻 Informatica</option>
                <option value="Arte">🎨 Arte</option>
            </select>
        </div>

        <div class="field-wrap">
            <div class="field-label">File appunto</div>
            <div class="drop-zone" id="dropZone"
                onclick="document.getElementById('upFile').click()"
                ondragover="dragOver(event)" ondragleave="dragLeave(event)" ondrop="dropFile(event)">
                <div class="drop-zone__icon">📄</div>
                <div class="drop-zone__text" id="dropText">Clicca o trascina il file qui</div>
                <div class="drop-zone__sub">PDF, DOC, TXT, PNG — max 10 MB</div>
            </div>
            <input type="file" id="upFile" accept=".pdf,.doc,.docx,.txt,.png,.jpg" style="display:none" onchange="fileSelezionato(event)">
        </div>

        <button class="btn-save" id="btnPubblica" onclick="pubblicaAppunto()">Pubblica appunto</button>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    const coloriMap = {
        "Matematica":"#d97706","Scienze":"#22c55e","Fisica":"#3b82f6",
        "Chimica":"#a855f7","Storia":"#ec4899","Geografia":"#14b8a6",
        "Italiano":"#f59e0b","Inglese":"#6366f1","Informatica":"#ef4444","Arte":"#0ea5e9"
    };
    const iconeMap = {
        "Matematica":"∑","Scienze":"🔬","Fisica":"⚛️","Chimica":"🧪",
        "Storia":"📖","Geografia":"🌍","Italiano":"✏️","Inglese":"🗣️",
        "Informatica":"💻","Arte":"🎨"
    };

    // ── Legge l'ID utente dalla sessione (cookie) ──
    // Adattalo al tuo sistema di autenticazione
    function getUtenteId() {
        const match = document.cookie.match(/utente_id=(\d+)/);
        return match ? match[1] : null;
    }
    function getUsername() {
        const match = document.cookie.match(/username=([^;]+)/);
        return match ? decodeURIComponent(match[1]) : null;
    }

    const utenteId = getUtenteId();
    const username = getUsername();

    // ── CARICA APPUNTI PUBBLICATI DAL DB ──
    async function caricaAppuntiPubblicati() {
        const grid = document.getElementById('gridPub');
        if (!username) {
            grid.innerHTML = `<div class="empty"><div class="empty__icon">🔒</div><p>Accedi per vedere i tuoi appunti.</p></div>`;
            return;
        }
        try {
            const res = await fetch(`/api/appunti?username=${encodeURIComponent(username)}`);
            const appunti = res.ok ? await res.json() : [];

            document.getElementById('statPub').textContent = appunti.length;

            if (appunti.length === 0) {
                grid.innerHTML = `<div class="empty"><div class="empty__icon">📭</div><p>Non hai ancora pubblicato appunti.</p></div>`;
                return;
            }

            grid.innerHTML = `<div class="tiktok-grid">${appunti.map(a => {
                const c    = coloriMap[a.materia] || '#888';
                const icon = iconeMap[a.materia]  || '📄';
                const click = a.file_url ? `onclick="window.open('${a.file_url}','_blank')"` : '';
                return `
                    <div class="tt-card" style="--c:${c}" ${click}>
                        <div class="tt-card__thumb">
                            <div class="tt-card__bg" style="background:radial-gradient(circle at 50% 40%,${c},transparent 72%)"></div>
                            <div class="tt-card__emoji">${icon}</div>
                        </div>
                        <div class="tt-card__body">
                            <div class="tt-card__chip">${a.materia}</div>
                            <div class="tt-card__title">${a.titolo}</div>
                            <div class="tt-card__meta">${a.data || ''} ${a.file_url ? '· 📎' : ''}</div>
                        </div>
                    </div>`;
            }).join('')}</div>`;

        } catch {
            grid.innerHTML = `<div class="empty"><div class="empty__icon">⚠️</div><p>Impossibile caricare gli appunti.</p></div>`;
        }
    }

    // ── CARICA APPUNTI SALVATI DAL DB ──
    async function caricaAppuntiSalvati() {
        const grid = document.getElementById('gridSav');
        // TODO: quando implementi la tabella "salvati" nel DB, chiama l'API qui
        // Per ora mostra stato vuoto pulito
        document.getElementById('statSav').textContent = '0';
        grid.innerHTML = `<div class="empty"><div class="empty__icon">🔖</div><p>Non hai ancora salvato appunti.</p></div>`;
    }

    // ── UPLOAD FOTO PROFILO ──
    async function uploadAvatar(e) {
        const file = e.target.files[0];
        if (!file) return;

        // Anteprima immediata
        const reader = new FileReader();
        reader.onload = ev => {
            document.getElementById('avatarImg').src = ev.target.result;
            document.getElementById('avatarImg').style.display = 'block';
            document.getElementById('avatarPh').style.display = 'none';
        };
        reader.readAsDataURL(file);

        if (!utenteId) { toast('⚠️ Devi essere loggato per caricare la foto'); return; }

        try {
            const res = await fetch(`/api/upload?type=profilo&userId=${utenteId}&filename=${encodeURIComponent(file.name)}`, {
                method: 'POST',
                body: file
            });
            const data = await res.json();
            if (data.success) toast('📸 Foto profilo aggiornata!');
            else toast('⚠️ Errore nel caricamento foto');
        } catch {
            toast('⚠️ Errore di connessione');
        }
    }

    // ── SALVA PROFILO (nickname + bio) ──
    async function salvaProfilo() {
        const nick = document.getElementById('nickIn').value.trim();
        if (!nick) { toast('⚠️ Inserisci un nickname!'); return; }
        // TODO: chiamata API per salvare nickname e bio nel DB
        // await fetch('/api/aggiorna-profilo', { method:'POST', body: JSON.stringify({ nick, bio }) });
        toast('✅ Profilo salvato!');
    }

    // ── PUBBLICA APPUNTO ──
    let fileSelezionatoObj = null;

    async function pubblicaAppunto() {
        const titolo  = document.getElementById('upTitolo').value.trim();
        const materia = document.getElementById('upMateria').value;

        if (!titolo)  { toast('⚠️ Inserisci un titolo!'); return; }
        if (!materia) { toast('⚠️ Seleziona una materia!'); return; }
        if (!fileSelezionatoObj) { toast('⚠️ Seleziona un file!'); return; }
        if (!utenteId) { toast('⚠️ Devi essere loggato!'); return; }

        const btn = document.getElementById('btnPubblica');
        btn.textContent = 'Caricamento…';
        btn.disabled = true;

        try {
            const res = await fetch(
                `/api/upload?type=appunto&userId=${utenteId}&titolo=${encodeURIComponent(titolo)}&materia=${encodeURIComponent(materia)}&filename=${encodeURIComponent(fileSelezionatoObj.name)}`,
                { method: 'POST', body: fileSelezionatoObj }
            );
            const data = await res.json();

            if (data.success) {
                chiudiModale();
                toast('🎉 Appunto pubblicato!');
                // Ricarica la griglia dal DB
                document.getElementById('gridPub').innerHTML = '<div class="spinner"></div>';
                await caricaAppuntiPubblicati();
            } else {
                toast('⚠️ ' + (data.error || 'Errore durante il caricamento'));
            }
        } catch {
            toast('⚠️ Errore di connessione');
        }

        btn.textContent = 'Pubblica appunto';
        btn.disabled = false;
    }

    // ── UI HELPERS ──
    function cnt(iId, cId) {
        document.getElementById(cId).textContent = document.getElementById(iId).value.length;
    }

    function switchTab(id, btn) {
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-pill').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + id).classList.add('active');
        btn.classList.add('active');
    }

    function apriModale() {
        document.getElementById('modalBackdrop').classList.add('open');
        document.body.style.overflow = 'hidden';
    }

    function chiudiModale(e) {
        if (e && e.target !== document.getElementById('modalBackdrop')) return;
        document.getElementById('modalBackdrop').classList.remove('open');
        document.body.style.overflow = '';
        // Reset form
        document.getElementById('upTitolo').value = '';
        document.getElementById('upMateria').value = '';
        document.getElementById('dropText').textContent = 'Clicca o trascina il file qui';
        document.getElementById('dropZone').classList.remove('has-file');
        fileSelezionatoObj = null;
    }

    function fileSelezionato(e) {
        fileSelezionatoObj = e.target.files[0];
        if (!fileSelezionatoObj) return;
        document.getElementById('dropText').textContent = '✅ ' + fileSelezionatoObj.name;
        document.getElementById('dropZone').classList.add('has-file');
    }

    function dragOver(e) { e.preventDefault(); document.getElementById('dropZone').classList.add('drag-over'); }
    function dragLeave()  { document.getElementById('dropZone').classList.remove('drag-over'); }
    function dropFile(e) {
        e.preventDefault(); dragLeave();
        fileSelezionatoObj = e.dataTransfer.files[0];
        if (!fileSelezionatoObj) return;
        document.getElementById('dropText').textContent = '✅ ' + fileSelezionatoObj.name;
        document.getElementById('dropZone').classList.add('has-file');
        // Sincronizza con l'input file
        const dt = new DataTransfer();
        dt.items.add(fileSelezionatoObj);
        document.getElementById('upFile').files = dt.files;
    }

    function toast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg; t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2600);
    }

    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') chiudiModale();
    });

    // ── AVVIO ──
    caricaAppuntiPubblicati();
    caricaAppuntiSalvati();
</script>

<!-- INCOLLA QUESTO SCRIPT PRIMA DI </body> IN OGNI PAGINA HTML -->
<script>
    // Controlla se l'utente è loggato leggendo il cookie "username"
    function isLoggato() {
        return document.cookie.split(';').some(c => c.trim().startsWith('username='));
    }

    function aggiornaNavbar() {
        const btnLogin = document.querySelector('.nav__login');
        if (!btnLogin) return;

        if (isLoggato()) {
            // Nasconde il tasto "Accedi"
            btnLogin.style.display = 'none';
        } else {
            // Mostra il tasto "Accedi"
            btnLogin.style.display = '';
        }
    }

    // Esegui subito al caricamento della pagina
    aggiornaNavbar();
</script>

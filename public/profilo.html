<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profilo Utente — Appunti</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .profile-wrapper {
            margin-top: calc(var(--nav-h) + 40px);
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            padding: 20px;
        }
        .profile-card {
            background: #fff;
            border-radius: var(--radius);
            padding: 40px;
            border: 1px solid #e8e4dc;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }
        .avatar-upload {
            text-align: center;
            margin-bottom: 30px;
        }
        .avatar-preview {
            width: 120px;
            height: 120px;
            background: var(--paper);
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px dashed var(--accent2);
            overflow: hidden;
            cursor: pointer;
        }
        .avatar-preview img { width: 100%; height: 100%; object-fit: cover; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: 700; margin-bottom: 8px; color: var(--ink); }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid #ddd;
            font-family: 'DM Sans', sans-serif;
            outline: none;
        }
        .form-group input:focus { border-color: var(--accent2); }
        
        .btn-save {
            width: 100%;
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-weight: 800;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn-save:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .section-label { font-weight: bold; font-size: 1.2rem; margin-bottom: 20px; color: var(--ink); border-bottom: 2px solid var(--accent2); padding-bottom: 5px; display: inline-block;}
    </style>
</head>
<body>

<nav class="topnav">
    <div class="topnav__brand">📚 Appunti</div>
    <ul class="topnav__links">
        <li><a href="index.html">Home</a></li>
        <li><a href="esplora.html">Esplora</a></li>
        <li><a href="profilo.html" class="active">Profilo</a></li>
    </ul>
    <a href="logout.html" class="nav__login" style="background: var(--accent2); color: white;">Logout</a>
</nav>

<div class="profile-wrapper">
    
    <div class="profile-card">
        <div class="section-label">Il tuo Profilo</div>

        <div class="avatar-upload">
            <div class="avatar-preview" onclick="document.getElementById('fileIn').click()">
                <img id="avatarImg" style="display:none;">
                <span id="avatarPh">📸</span>
            </div>
            <input type="file" id="fileIn" hidden onchange="uploadAvatar(event)">
        </div>

        <div class="form-group">
            <label>NOME</label>
            <input type="text" id="nomeIn" placeholder="Inserisci il tuo nome">
        </div>
        
        <div class="form-group">
            <label>COGNOME</label>
            <input type="text" id="cognomeIn" placeholder="Inserisci il tuo cognome">
        </div>

        <div class="form-group">
            <label>EMAIL</label>
            <input type="email" id="emailIn" placeholder="La tua email">
        </div>

        <button class="btn-save" onclick="salvaProfilo()">Salva modifiche</button>
    </div>

    <div class="profile-card">
        <div class="section-label">Pubblica un nuovo appunto</div>
        
        <div class="form-group">
            <label>TITOLO</label>
            <input type="text" id="titoloAppunto" placeholder="Es: Appunti di Fisica">
        </div>
        <div class="form-group">
            <label>MATERIA</label>
            <input type="text" id="materiaAppunto" placeholder="Es: Scienze">
        </div>
        <div class="form-group">
            <label>FILE (PDF o Immagine)</label>
            <input type="file" id="fileAppunto" accept=".pdf,image/*">
        </div>
        <button class="btn-save" id="btnPubblica" style="background: var(--accent2);" onclick="pubblicaAppunto()">Pubblica su Esplora</button>
    </div>

    <div class="section-label" style="margin-top: 20px;">I miei appunti caricati</div>
    <div id="listaMieiAppunti" class="notes-grid">
        </div>

</div>

<footer class="site-footer" style="text-align: center; padding: 20px; color: #888; font-size: 0.9rem;">
    <strong>Appunti</strong> &copy; 2026 — Riorganizzato con stile.
</footer>

<script src="js/auth.js"></script>
<script src="js/profilo.js"></script>

</body>
</html>
